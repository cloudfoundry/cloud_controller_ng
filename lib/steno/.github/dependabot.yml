version: 2
updates:
  # Enable version updates for Ruby dependencies
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "mpage"
    assignees:
      - "mpage"
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "chore:"
    strategy:
      ignore-minor-version-updates: false