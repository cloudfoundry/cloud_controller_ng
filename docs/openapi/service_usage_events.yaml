---
openapi: 3.0.3
info:
  title: Cloud Controller V3 API
  version: v3
  description: Service usage events are a record of changes in the usage of services.
    For example, service usage events are recorded when a service instance is created,
    updated, and deleted. They may contain information about the service instance
    in question and the associated space, service broker, and service offering. Usage
    events are typically used by billing and chargeback applications.
servers: []
paths:
  "/v3/service_usage_events":
    get:
      summary: List service usage events
      tags:
      - ServiceUsageEvent
      parameters:
      - name: after_guid
        in: query
        required: false
        schema:
          type: string
        example: 3a0213c2-2bb7-4138-ad92-5e348331d33e
        description: Filters out events before and including the event with the given
          guid
      - name: created_ats[lt]
        in: query
        required: false
        schema:
          type: string
        example: '2020-05-26T18:47:03Z'
      - name: garbage
        in: query
        required: false
        schema:
          type: string
        example: 'true'
      - name: guids
        in: query
        required: false
        schema:
          type: string
        example: 07abffb1-9e9a-45a8-a224-d3785274e279
        description: Comma-delimited list of usage event guids to filter by
      - name: service_instance_types
        in: query
        required: false
        schema:
          type: string
        example: managed_service_instance
        description: Comma-delimited list of service instance types to filter by;
          valid values are managedserviceinstance and userprovidedservice_instance
      - name: service_offering_guids
        in: query
        required: false
        schema:
          type: string
        example: offering-guid
        description: Comma-delimited list of service offering guids to filter by
      - name: updated_ats[lt]
        in: query
        required: false
        schema:
          type: string
        example: '2020-05-26T18:47:03Z'
      responses:
        '200':
          description: returns the usage event matching the requested guid
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination:
                    type: object
                    properties:
                      total_results:
                        type: integer
                      total_pages:
                        type: integer
                      first:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      last:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      next:
                        nullable: true
                      previous:
                        nullable: true
                    required:
                    - total_results
                    - total_pages
                    - first
                    - last
                    - next
                    - previous
                  resources:
                    type: array
                    items:
                      type: object
                      properties:
                        guid:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        state:
                          type: string
                        space:
                          type: object
                          properties:
                            guid:
                              type: string
                            name:
                              type: string
                          required:
                          - guid
                          - name
                        organization:
                          type: object
                          properties:
                            guid:
                              type: string
                          required:
                          - guid
                        service_instance:
                          type: object
                          properties:
                            guid:
                              type: string
                            name:
                              type: string
                            type:
                              type: string
                          required:
                          - guid
                          - name
                          - type
                        service_plan:
                          type: object
                          properties:
                            guid:
                              type: string
                            name:
                              type: string
                          required:
                          - guid
                          - name
                        service_offering:
                          type: object
                          properties:
                            guid:
                              type: string
                            name:
                              type: string
                          required:
                          - guid
                          - name
                        service_broker:
                          type: object
                          properties:
                            guid:
                              nullable: true
                            name:
                              nullable: true
                          required:
                          - guid
                          - name
                        links:
                          type: object
                          properties:
                            self:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                          required:
                          - self
                      required:
                      - guid
                      - created_at
                      - updated_at
                      - state
                      - space
                      - organization
                      - service_instance
                      - service_plan
                      - service_offering
                      - service_broker
                      - links
                required:
                - pagination
                - resources
              example:
                pagination:
                  total_results: 1
                  total_pages: 1
                  first:
