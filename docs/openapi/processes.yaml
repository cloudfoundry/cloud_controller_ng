      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                instances:
                  type: integer
                memory_in_mb:
                  type: integer
                disk_in_mb:
                  type: integer
                log_rate_limit_in_bytes_per_second:
                  type: integer
              required:
              - instances
              - memory_in_mb
              - disk_in_mb
              - log_rate_limit_in_bytes_per_second
            example:
              instances: 5
              memory_in_mb: 10
              disk_in_mb: 20
              log_rate_limit_in_bytes_per_second: 40
      description: POST /v3/apps/:guid/processes/:type/actions/scale
  "/v3/processes/{process_guid}/instances/{index}":
    delete:
      summary: Terminate a process instance
      tags:
      - Process
      parameters:
      - name: index
        in: path
        required: true
        schema:
          type: integer
        example: 0
      - name: process_guid
        in: path
        required: true
        schema:
          type: string
        example: ddb7d76b-b8f1-4e3d-a4b6-05100272695a
      responses:
        '204':
          description: terminates a single instance of a process
      description: DELETE /v3/apps/:guid/processes/:type/instances/:index
  "/v3/processes/{process_guid}/process_instances":
    get:
      summary: Get process instances for a process (experimental)
      tags:
      - Process
      parameters:
      - name: process_guid
        in: path
        required: true
        schema:
          type: string
        example: e43cf255-6da8-4231-9bcf-618380406ab6
      responses:
        '200':
          description: retrieves all process instances for the process
          content:
            application/json:
              schema:
                type: object
                properties:
                  resources:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        state:
                          type: string
                        since:
                          type: integer
                      required:
                      - index
                      - state
                      - since
                  links:
                    type: object
                    properties:
                      self:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      process:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                    required:
                    - self
                    - process
                required:
                - resources
                - links
              example:
                resources:
                - index: 0
                  state: RUNNING
                  since: 172800
                - index: 1
                  state: STARTING
                  since: 172799
                links:
                  self:
                    href: http://api2.vcap.me/v3/processes/e43cf255-6da8-4231-9bcf-618380406ab6/process_instances
                  process:
                    href: http://api2.vcap.me/v3/processes/e43cf255-6da8-4231-9bcf-618380406ab6
      description: Retrieves process instances.
  "/v3/processes/{process_guid}/stats":
    get:
      summary: Get stats for a process
      tags:
      - Process
      parameters:
      - name: process_guid
        in: path
        required: true
        schema:
          type: string
        example: 28f9d251-0018-47d7-869b-26833731df4c
      responses:
        '200':
          description: retrieves the stats for a process
          content:
            application/json:
              schema:
                type: object
                properties:
                  resources:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                        index:
                          type: integer
                        instance_guid:
                          type: string
                        state:
                          type: string
                        routable:
                          type: boolean
                        host:
                          type: string
                        instance_internal_ip:
                          type: string
                        uptime:
                          type: integer
                        mem_quota:
                          type: integer
                        disk_quota:
                          type: integer
                        log_rate_limit:
                          type: integer
                        fds_quota:
                          type: integer
                        isolation_segment:
                          type: string
                        details:
                          type: string
                        instance_ports:
                          type: array
                          items:
                            type: object
                            properties:
                              external:
                                type: integer
                              internal:
                                type: integer
                              external_tls_proxy_port:
                                type: integer
                              internal_tls_proxy_port:
                                type: integer
                            required:
                            - external
                            - internal
                            - external_tls_proxy_port
                            - internal_tls_proxy_port
                        usage:
                          type: object
                          properties:
                            time:
                              type: string
                            cpu:
                              type: number
                              format: float
                            cpu_entitlement:
                              nullable: true
                              type: number
                              format: float
                            mem:
                              type: integer
                            disk:
                              type: integer
                            log_rate:
                              type: integer
                          required:
                          - time
                          - cpu
                          - cpu_entitlement
                          - mem
                          - disk
                          - log_rate
                      required:
                      - type
                      - index
                      - instance_guid
                      - state
                      - routable
                      - host
                      - instance_internal_ip
                      - uptime
                      - mem_quota
                      - disk_quota
                      - log_rate_limit
                      - fds_quota
                      - isolation_segment
                      - details
                      - instance_ports
                      - usage
                required:
                - resources
              example:
                resources:
                - type: worker
                  index: 0
                  instance_guid: some-diego-instance-id
                  state: RUNNING
                  routable: true
                  host: toast
                  instance_internal_ip: 5.6.7.8
                  uptime: 12345
                  mem_quota: 1073741824
                  disk_quota: 1073741824
                  log_rate_limit: 1048576
                  fds_quota: 16384
                  isolation_segment: very-isolated
                  details: some-details
                  instance_ports:
                  - external: 8080
                    internal: 1234
                    external_tls_proxy_port: 61002
                    internal_tls_proxy_port: 61003
                  - external: 3000
                    internal: 4000
                    external_tls_proxy_port: 61006
                    internal_tls_proxy_port: 61007
                  usage:
                    time: 2026-03-31 23:36:48 UTC
                    cpu: 0.8
                    cpu_entitlement: 0.1
                    mem: 128
                    disk: 1024
                    log_rate: 1024
      description: GET /v3/apps/:guid/processes/:type/stats
tags:
- name: Process
  description: 'Processes define the runnable units of an app. An app can have multiple
    process types, each with differing commands and scale. Processes for an app are
    defined by the buildpack used to stage the app and can be customized by including
    a [Procfile](#procfiles) in the application source. #### Web process type * By
    default, a newly created app will come with one instance of the `web` process
    and all other process types are scaled to zero * Scale the `web` process to zero
    if it is not required for your app * Unless otherwise specified, all routes will
    be mapped to the `web` process by default'
