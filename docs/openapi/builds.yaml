---
openapi: 3.0.3
info:
  title: Cloud Controller V3 API
  version: v3
  description: 'Builds represent the process of staging an application package. There
    are two types ([lifecycles](#lifecycles)) of builds: buildpack and docker. After
    an [application](#apps) is created and [packages](#packages) are uploaded, a build
    resource can be created to initiate the staging process. A successful build results
    in a [droplet](#droplets).'
servers: []
paths:
  "/v3/builds":
    get:
      summary: List builds
      tags:
      - Build
      parameters:
      - name: label_selector
        in: query
        required: false
        schema:
          type: string
        example: fruit=strawberry
        description: A query string containing a list of label selector requirements
      - name: order_by
        in: query
        required: false
        schema:
          type: string
        example: "-created_at"
        description: Value to sort by; defaults to ascending. Prepend with - to sort
          descending.  Valid values are createdat, updatedat
      - name: package_guids
        in: query
        required: false
        schema:
          type: string
        example: 28cc8e70-188c-43e4-980b-7616f73e3bcf,6cc5099a-a0aa-4632-8699-adb2ac147cf4
        description: Comma-delimited list of package guids to filter by
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
        example: 2
        description: Number of results per page;  valid values are 1 through 5000
      responses:
        '200':
          description: accepts 2 package guids
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination:
                    type: object
                    properties:
                      total_results:
                        type: integer
                      total_pages:
                        type: integer
                      first:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      last:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      next:
                        nullable: true
                      previous:
                        nullable: true
                    required:
                    - total_results
                    - total_pages
                    - first
                    - last
                    - next
                    - previous
                  resources:
                    type: array
                    items:
                      type: object
                      properties:
                        guid:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        state:
                          type: string
                        staging_memory_in_mb:
                          type: integer
                        staging_disk_in_mb:
                          type: integer
                        staging_log_rate_limit_bytes_per_second:
                          type: integer
                        error:
                          nullable: true
                        lifecycle:
                          type: object
                          properties:
                            type:
                              type: string
                            data:
                              type: object
                              properties:
                                buildpacks:
                                  type: array
                                  items:
                                    type: string
                                stack:
                                  type: string
                              required:
                              - buildpacks
                              - stack
                          required:
                          - type
                          - data
                        package:
                          type: object
                          properties:
                            guid:
                              type: string
                          required:
                          - guid
                        droplet:
                          type: object
                          properties:
                            guid:
                              type: string
                          required:
                          - guid
                        created_by:
                          type: object
                          properties:
                            guid:
                              type: string
                            name:
                              type: string
                            email:
                              type: string
                          required:
                          - guid
                          - name
                          - email
                        relationships:
                          type: object
                          properties:
                            app:
                              type: object
                              properties:
                                data:
                                  type: object
                                  properties:
                                    guid:
                                      type: string
                                  required:
                                  - guid
                              required:
                              - data
                          required:
                          - app
                        metadata:
                          type: object
                          properties:
                            labels:
                              type: object
                              properties:
                                fruit:
                                  type: string
                            annotations:
                              type: object
                              properties: {}
                          required:
                          - labels
                          - annotations
                        links:
                          type: object
                          properties:
                            self:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                            app:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                            droplet:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                          required:
                          - self
                          - app
                          - droplet
                      required:
                      - guid
                      - created_at
                      - updated_at
                      - state
                      - staging_memory_in_mb
                      - staging_disk_in_mb
                      - staging_log_rate_limit_bytes_per_second
                      - error
                      - lifecycle
                      - package
                      - droplet
                      - created_by
                      - relationships
                      - metadata
                      - links
                required:
                - pagination
                - resources
              example:
                pagination:
                  total_results: 2
                  total_pages: 1
                  first:
                    href: http://api2.vcap.me/v3/builds?package_guids=28cc8e70-188c-43e4-980b-7616f73e3bcf%2C6cc5099a-a0aa-4632-8699-adb2ac147cf4&page=1&per_page=50
