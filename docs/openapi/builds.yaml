      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                metadata:
                  type: object
                  properties:
                    labels:
                      type: object
                      properties:
                        release:
                          type: string
                        seriouseats.com/potato:
                          type: string
                      required:
                      - release
                      - seriouseats.com/potato
                    annotations:
                      type: object
                      properties:
                        checksum:
                          type: string
                      required:
                      - checksum
                  required:
                  - labels
                  - annotations
                state:
                  type: string
                lifecycle:
                  type: object
                  properties:
                    type:
                      type: string
                    data:
                      type: object
                      properties:
                        image:
                          type: string
                      required:
                      - image
                  required:
                  - type
                  - data
                error:
                  type: string
            example:
              metadata:
                labels:
                  release: stable
                  seriouseats.com/potato: mashed
                annotations:
                  checksum: SHA
              state: STAGED
              lifecycle:
                type: kpack
                data:
                  image: some-fake-image:tag
              error: failed to stage build
tags:
- name: Build
  description: 'Builds represent the process of staging an application package. There
    are two types ([lifecycles](#lifecycles)) of builds: buildpack and docker. After
    an [application](#apps) is created and [packages](#packages) are uploaded, a build
    resource can be created to initiate the staging process. A successful build results
    in a [droplet](#droplets).'
