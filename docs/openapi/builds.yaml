    post:
      summary: Create a build
      tags:
      - Build
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                lifecycle:
                  type: object
                  properties:
                    type:
                      type: string
                    data:
                      type: object
                      properties:
                        buildpacks:
                          type: array
                          items:
                            type: string
                        stack:
                          type: string
                      required:
                      - buildpacks
                      - stack
                  required:
                  - type
                  - data
                package:
                  type: object
                  properties:
                    guid:
                      type: string
                  required:
                  - guid
                metadata:
                  type: object
                  properties:
                    labels:
                      type: object
                      properties:
                        release:
                          type: string
                        seriouseats.com/potato:
                          type: string
                      required:
                      - release
                      - seriouseats.com/potato
                    annotations:
                      type: object
                      properties:
                        potato:
                          type: string
                      required:
                      - potato
                  required:
                  - labels
                  - annotations
              required:
              - lifecycle
              - package
            example:
              lifecycle:
                type: buildpack
                data:
                  buildpacks:
                  - http://github.com/myorg/awesome-buildpack
                  stack: cflinuxfs4
              package:
                guid: 3e00d599-1074-4b6c-a884-4bc62575799f
              metadata:
                labels:
                  release: stable
                  seriouseats.com/potato: mashed
                annotations:
                  potato: idaho
