    patch:
      summary: update
      tags:
      - Package
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 4dbe5fdf-ef28-44fc-9e39-50271c14270b
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                metadata:
                  type: object
                  properties:
                    labels:
                      type: object
                      properties:
                        release:
                          type: string
                        seriouseats.com/potato:
                          type: string
                      required:
                      - release
                      - seriouseats.com/potato
                    annotations:
                      type: object
                      properties:
                        checksum:
                          type: string
                      required:
                      - checksum
                  required:
                  - labels
                  - annotations
              required:
              - metadata
            example:
              metadata:
                labels:
                  release: stable
                  seriouseats.com/potato: mashed
                annotations:
                  checksum: SHA
      responses:
        '200':
          description: updates package metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  guid:
                    type: string
                  created_at:
                    type: string
                  updated_at:
                    type: string
                  type:
                    type: string
                  data:
                    type: object
                    properties:
                      error:
                        nullable: true
                      checksum:
                        type: object
                        properties:
                          type:
                            type: string
                          value:
                            type: string
                        required:
                        - type
                        - value
                    required:
                    - error
                    - checksum
                  state:
                    type: string
                  relationships:
                    type: object
                    properties:
                      app:
                        type: object
                        properties:
                          data:
                            type: object
                            properties:
                              guid:
                                type: string
                            required:
                            - guid
                        required:
                        - data
                    required:
                    - app
                  metadata:
                    type: object
                    properties:
                      labels:
                        type: object
                        properties:
                          release:
                            type: string
                          seriouseats.com/potato:
                            type: string
                        required:
                        - release
                        - seriouseats.com/potato
                      annotations:
                        type: object
                        properties:
                          checksum:
                            type: string
                        required:
                        - checksum
                    required:
                    - labels
                    - annotations
                  links:
                    type: object
                    properties:
                      self:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      upload:
                        type: object
                        properties:
                          href:
                            type: string
                          method:
                            type: string
                        required:
                        - href
                        - method
                      download:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      app:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                    required:
                    - self
                    - upload
                    - download
                    - app
                required:
                - guid
                - created_at
                - updated_at
                - type
                - data
                - state
                - relationships
                - metadata
                - links
              example:
                guid: 4dbe5fdf-ef28-44fc-9e39-50271c14270b
