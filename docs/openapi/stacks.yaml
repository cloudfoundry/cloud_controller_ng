                    type: array
                    items:
                      type: object
                      properties:
                        guid:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        state:
                          type: string
                        state_reason:
                          nullable: true
                        run_rootfs_image:
                          type: string
                        build_rootfs_image:
                          type: string
                        default:
                          type: boolean
                        metadata:
                          type: object
                          properties:
                            labels:
                              type: object
                              properties:
                                release:
                                  type: string
                            annotations:
                              type: object
                              properties: {}
                          required:
                          - labels
                          - annotations
                        links:
                          type: object
                          properties:
                            self:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                          required:
                          - self
                      required:
                      - guid
                      - created_at
                      - updated_at
                      - name
                      - description
                      - state
                      - state_reason
                      - run_rootfs_image
                      - build_rootfs_image
                      - default
                      - metadata
                      - links
                required:
                - pagination
                - resources
              example:
                pagination:
                  total_results: 1
                  total_pages: 1
                  first:
                    href: http://api2.vcap.me/v3/stacks?label_selector=release%3Dstable&page=1&per_page=50
                  last:
                    href: http://api2.vcap.me/v3/stacks?label_selector=release%3Dstable&page=1&per_page=50
                  next:
                  previous:
