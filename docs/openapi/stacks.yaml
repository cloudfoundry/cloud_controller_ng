                          type: string
                      required:
                      - potato
                  required:
                  - labels
                  - annotations
              required:
              - name
              - description
              - metadata
            example:
              name: the-name
              description: the-description
              metadata:
                labels:
                  potato: yam
                annotations:
                  potato: idaho
