openapi: 3.0.3
info:
  title: Cloud Controller V3 API
  version: v3
servers: []
paths:
  "/v3/stacks":
    get:
      summary: index
      tags:
      - Stack
      parameters:
      - name: default
        in: query
        required: false
        schema:
          type: string
        example: 'true'
      - name: label_selector
        in: query
        required: false
        schema:
          type: string
        example: release=stable
      - name: names
        in: query
        required: false
        schema:
          type: string
        example: name-6962,name-6963
      - name: page
        in: query
        required: false
        schema:
          type: integer
        example: 1
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
        example: 2
      responses:
        '200':
          description: returns a list of label filtered stacks
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination:
                    type: object
                    properties:
                      total_results:
                        type: integer
                      total_pages:
                        type: integer
                      first:
                        type: object
                        properties:
                          href:
