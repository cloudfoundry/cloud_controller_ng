    post:
      summary: Apply a service plan visibility
      tags:
      - ServicePlanVisibility
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 10e51ea5-e6b9-4f83-b0ac-6e0c7ef1b709
      responses:
        '200':
          description: creates an audit event
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                required:
                - type
              example:
                type: public
