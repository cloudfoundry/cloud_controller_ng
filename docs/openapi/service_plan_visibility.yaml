    patch:
      summary: Update a service plan visibility
      tags:
      - ServicePlanVisibility
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: c6cf27c1-3343-40ea-bb58-8b5fe6294084
      responses:
        '400':
          description: returns a 400 bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        detail:
                          type: string
                        title:
                          type: string
                        code:
                          type: integer
                        test_mode_info:
                          type: object
                          properties:
                            detail:
                              type: string
                            title:
                              type: string
                            backtrace:
                              type: array
                              items:
                                type: string
                          required:
                          - detail
                          - title
                          - backtrace
                      required:
                      - detail
