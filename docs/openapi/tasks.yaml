                      - created_at
                      - updated_at
                      - sequence_id
                      - name
                      - user
                      - state
                      - memory_in_mb
                      - disk_in_mb
                      - log_rate_limit_in_bytes_per_second
                      - result
                      - droplet_guid
                      - relationships
                      - metadata
                      - links
                required:
                - pagination
                - resources
              example:
                pagination:
                  total_results: 1
                  total_pages: 1
                  first:
