---
openapi: 3.0.3
info:
  title: Cloud Controller V3 API
  version: v3
  description: Tasks are one-off jobs that are intended to perform a task, stop, and
    be cleaned up, freeing up resources. Examples of this include database migrations,
    sending things, and batch jobs.
servers: []
paths:
  "/v3/apps/{app_guid}/tasks":
    get:
      summary: List tasks for an app
      tags:
      - Task
      parameters:
      - name: app_guid
        in: path
        required: true
        schema:
          type: string
        example: 40f19066-7eb7-4629-9e13-ff64dafb89c8
        description: Unique identifier for the resource
      - name: names
        in: query
        required: false
        schema:
          type: string
        example: task one
        description: Comma-delimited list of task names to filter by
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
        example: 2
        description: Number of results per page;  valid values are 1 through 5000
      - name: sequence_ids
        in: query
        required: false
        schema:
          type: integer
        example: 117
        description: Comma delimited list of sequence ids to filter by Valid values
          are integers >= 1
      - name: states
        in: query
        required: false
        schema:
          type: string
        example: SUCCEEDED
        description: Comma-delimited list of task states to filter by
      responses:
        '200':
          description: filters by state
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination:
                    type: object
                    properties:
                      total_results:
                        type: integer
                      total_pages:
                        type: integer
                      first:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      last:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      next:
                        nullable: true
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      previous:
                        nullable: true
                    required:
                    - total_results
                    - total_pages
                    - first
                    - last
                    - next
                    - previous
                  resources:
                    type: array
                    items:
                      type: object
                      properties:
                        guid:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        sequence_id:
                          type: integer
                        name:
                          type: string
                        user:
                          type: string
                        state:
                          type: string
                        memory_in_mb:
                          type: integer
                        disk_in_mb:
                          nullable: true
                          type: integer
                        log_rate_limit_in_bytes_per_second:
                          type: integer
                        result:
                          type: object
                          properties:
                            failure_reason:
                              nullable: true
                          required:
                          - failure_reason
                        droplet_guid:
                          type: string
                        relationships:
                          type: object
                          properties:
                            app:
                              type: object
                              properties:
                                data:
                                  type: object
                                  properties:
                                    guid:
                                      type: string
                                  required:
                                  - guid
                              required:
                              - data
                          required:
                          - app
                        metadata:
                          type: object
                          properties:
                            labels:
                              type: object
                              properties: {}
                            annotations:
                              type: object
                              properties: {}
                          required:
                          - labels
                          - annotations
                        links:
                          type: object
                          properties:
                            self:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                            app:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                            cancel:
                              type: object
