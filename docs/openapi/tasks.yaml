  "/v3/tasks":
    get:
      summary: List tasks
      tags:
      - Task
      parameters:
      - name: app_guids
        in: query
        required: false
        schema:
          type: string
        example: 677656cf-6e44-4e3f-83e1-41e57f1b3033
        description: Comma-delimited list of app guids to filter by
      - name: label_selector
        in: query
        required: false
        schema:
          type: string
        example: boomerang=gel
        description: A query string containing a list of label selector requirements
      - name: names
        in: query
        required: false
        schema:
          type: string
        example: task one
        description: Comma-delimited list of task names to filter by
      - name: organization_guids
        in: query
        required: false
        schema:
          type: string
        example: 3121fb34-2854-42c8-b7fe-902b1d6bd540
        description: Comma-delimited list of organization guids to filter by
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
        example: 2
        description: Number of results per page;  valid values are 1 through 5000
      - name: space_guids
        in: query
        required: false
        schema:
          type: string
        example: c1b4df02-30eb-49d7-9711-c202448049bf
        description: Comma-delimited list of space guids to filter by
      - name: states
        in: query
        required: false
        schema:
          type: string
        example: SUCCEEDED
        description: Comma-delimited list of task states to filter by
      responses:
        '200':
          description: filters by label selectors
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination:
                    type: object
                    properties:
                      total_results:
                        type: integer
                      total_pages:
                        type: integer
                      first:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      last:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      next:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                        nullable: true
                      previous:
                        nullable: true
                    required:
                    - total_results
                    - total_pages
                    - first
                    - last
                    - next
                    - previous
                  resources:
                    type: array
                    items:
                      type: object
                      properties:
                        guid:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        sequence_id:
                          type: integer
                        name:
                          type: string
                        user:
                          type: string
                        state:
                          type: string
                        memory_in_mb:
                          type: integer
                        disk_in_mb:
                          type: integer
                          nullable: true
                        log_rate_limit_in_bytes_per_second:
                          type: integer
                        result:
                          type: object
                          properties:
                            failure_reason:
                              nullable: true
                          required:
                          - failure_reason
                        droplet_guid:
                          type: string
                        relationships:
                          type: object
                          properties:
                            app:
                              type: object
                              properties:
                                data:
                                  type: object
                                  properties:
                                    guid:
                                      type: string
                                  required:
                                  - guid
                              required:
                              - data
                          required:
                          - app
                        metadata:
                          type: object
                          properties:
                            labels:
                              type: object
                              properties:
                                boomerang:
                                  type: string
                            annotations:
                              type: object
                              properties: {}
                          required:
                          - labels
                          - annotations
                        links:
                          type: object
                          properties:
                            self:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                            app:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                            cancel:
                              type: object
                              properties:
                                href:
                                  type: string
                                method:
                                  type: string
                              required:
                              - href
                              - method
                            droplet:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                          required:
                          - self
                          - app
                          - cancel
                          - droplet
                      required:
                      - guid
                      - created_at
                      - updated_at
                      - sequence_id
                      - name
                      - user
                      - state
                      - memory_in_mb
                      - disk_in_mb
                      - log_rate_limit_in_bytes_per_second
                      - result
                      - droplet_guid
                      - relationships
                      - metadata
                      - links
                required:
                - pagination
                - resources
