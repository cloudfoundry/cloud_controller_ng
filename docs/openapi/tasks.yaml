    post:
      summary: Create a task
      tags:
      - Task
      parameters:
      - name: app_guid
        in: path
        required: true
        schema:
          type: string
        example: '00826ddf-1a91-4618-a6f2-24b4516d3845'
        description: Unique identifier for the resource
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                command:
                  type: string
                user:
                  type: string
                memory_in_mb:
                  type: integer
                disk_in_mb:
                  type: integer
                log_rate_limit_in_bytes_per_second:
                  type: integer
                metadata:
                  type: object
                  properties:
                    labels:
                      type: object
                      properties:
                        bananas:
                          type: string
                      required:
                      - bananas
                    annotations:
                      type: object
                      properties:
                        wombats:
                          type: string
                      required:
                      - wombats
                  required:
                  - labels
                  - annotations
                droplet_guid:
                  type: string
                template:
                  type: object
                  properties:
                    process:
                      type: object
                      properties:
                        guid:
                          type: string
                      required:
                      - guid
                  required:
                  - process
              required:
              - name
              - memory_in_mb
            example:
              name: best task ever
              command: be rake && true
              user: TestUser
              memory_in_mb: 1234
              disk_in_mb: 1000
              log_rate_limit_in_bytes_per_second: 199
              metadata:
                labels:
                  bananas: gros_michel
                annotations:
                  wombats: althea
              droplet_guid: 59605a78-6959-441b-9e6d-20eaa4254a3b
              template:
