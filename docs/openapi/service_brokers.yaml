                        type: object
                        properties:
                          amount:
                            type: string
                          style:
                            type: string
                        required:
                        - amount
                        - style
                    required:
                    - labels
                    - annotations
                  links:
                    type: object
                    properties:
                      self:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      service_offerings:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                    required:
                    - self
                    - service_offerings
                required:
                - guid
                - created_at
                - updated_at
                - name
                - url
                - relationships
                - metadata
                - links
