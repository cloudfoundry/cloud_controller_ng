  "/v3/service_brokers/{guid}":
    delete:
      summary: Delete a service broker
      tags:
      - ServiceBroker
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: guid-that-does-not-exist
      responses:
        '202':
          description: marks the broker as deleting
          content:
            text/html:
              schema:
                type: string
              example: ''
        '404':
          description: responds with 404 Not Found
          content:
            application/json:
              schema:
                type: object
