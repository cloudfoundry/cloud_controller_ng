---
openapi: 3.0.3
info:
  title: Cloud Controller V3 API
  version: v3
  description: Service brokers manage the lifecycle of services. On behalf of users,
    Cloud Controller will interact with service brokers to provision, get access to
    and manage access to the service offerings and plans they offer. Admins can create
    and manage service brokers that are globally available, i.e., the service broker
    and its associated resources (service offerings and plans) can be made available
    to all users. Space Developers can create and manage space-scoped service brokers.
    A space-scoped broker and its associated resources will only be available in the
    space the service broker was created.
servers: []
paths:
  "/v3/jobs/{guid}":
    get:
      summary: Get a job
      tags:
      - V3::Job
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 4f65035f-302a-4864-8c7e-8bdc0b9ae7f6
      responses:
        '200':
          description: is marked as processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  guid:
                    type: string
                  created_at:
                    type: string
                  updated_at:
                    type: string
                  operation:
                    type: string
                  state:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        detail:
                          type: string
                        title:
                          type: string
                        code:
                          type: integer
                        test_mode_info:
                          type: object
                          properties:
                            detail:
                              type: string
                            title:
                              type: string
                            backtrace:
                              type: array
                              items:
                                type: string
                          required:
                          - detail
                          - title
                          - backtrace
                      required:
                      - title
                      - detail
                      - code
                      - test_mode_info
                  warnings:
                    type: array
                    items:
                      type: object
                      properties:
                        detail:
                          type: string
                      required:
                      - detail
                  links:
                    type: object
                    properties:
                      self:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      service_brokers:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      service_broker:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                    required:
                    - self
                required:
                - guid
                - created_at
                - updated_at
                - operation
                - state
                - errors
                - warnings
                - links
              example:
                guid: 4f65035f-302a-4864-8c7e-8bdc0b9ae7f6
                created_at: '2026-03-31T23:33:12Z'
                updated_at: '2026-03-31T23:33:12Z'
                operation: service_broker.delete
                state: PROCESSING
                errors: []
                warnings: []
                links:
                  self:
                    href: http://api2.vcap.me/v3/jobs/4f65035f-302a-4864-8c7e-8bdc0b9ae7f6
                  service_brokers:
                    href: http://api2.vcap.me/v3/service_brokers/46f4e6fa-1cb7-463e-a5c1-6a1db2fef180
                  service_broker:
                    href: http://api2.vcap.me/v3/service_brokers/a73c586b-7a54-406c-80fd-f4840b0fb031
  "/v3/service_brokers":
    get:
      summary: List service brokers
      tags:
      - ServiceBroker
      responses:
        '200':
          description: returns 200 OK and an empty list of brokers for space developer
            in another space
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination:
                    type: object
                    properties:
                      total_results:
                        type: integer
                      total_pages:
                        type: integer
                      first:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      last:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      next:
                        nullable: true
                      previous:
                        nullable: true
                    required:
                    - total_results
                    - total_pages
                    - first
                    - last
                    - next
                    - previous
                  resources:
                    type: array
                    items:
                      type: object
                      properties:
                        guid:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        name:
                          type: string
                        url:
                          type: string
                        relationships:
                          type: object
                          properties:
                            space:
                              type: object
                              properties:
                                data:
                                  type: object
                                  properties:
                                    guid:
                                      type: string
                                  required:
                                  - guid
                              required:
                              - data
                        metadata:
                          type: object
                          properties:
                            labels:
                              type: object
                              properties:
                                boomerang:
                                  type: string
                            annotations:
                              type: object
                              properties: {}
                          required:
                          - labels
                          - annotations
                        links:
                          type: object
                          properties:
                            self:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                            service_offerings:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                            space:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                          required:
                          - self
                          - service_offerings
                      required:
                      - guid
                      - created_at
                      - updated_at
                      - name
                      - url
                      - relationships
                      - metadata
                      - links
                required:
                - pagination
                - resources
              example:
                pagination:
                  total_results: 0
                  total_pages: 1
                  first:
                    href: http://api2.vcap.me/v3/service_brokers?page=1&per_page=50
                  last:
                    href: http://api2.vcap.me/v3/service_brokers?page=1&per_page=50
                  next:
                  previous:
                resources: []
      parameters:
      - name: label_selector
        in: query
        required: false
        schema:
          type: string
        example: boomerang=gel
        description: A query string containing a list of label selector requirements
      - name: names
        in: query
        required: false
        schema:
          type: string
        example: test-broker-foo
        description: Comma-delimited list of service broker names to filter by
      - name: space_guids
        in: query
        required: false
        schema:
          type: string
        example: f2ff5a52-80c8-4de3-a7df-75743d3f19b8
        description: Comma-delimited list of space GUIDs to filter by
    post:
      summary: Create a service broker
      tags:
      - ServiceBroker
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                url:
                  type: string
                authentication:
                  type: object
                  properties:
                    type:
                      type: string
                    credentials:
                      type: object
                      properties:
                        username:
                          type: string
                        password:
                          type: string
                      required:
                      - username
                      - password
                  required:
                  - type
                  - credentials
                metadata:
                  type: object
                  properties:
                    labels:
                      type: object
                      properties:
                        potato:
                          type: string
                      required:
                      - potato
                    annotations:
                      type: object
                      properties:
                        style:
                          type: string
                      required:
                      - style
                  required:
                  - labels
                  - annotations
              required:
              - name
              - url
              - authentication
            example:
              name: broker name
              url: http://example.org/broker-url
              authentication:
                type: basic
                credentials:
                  username: admin
                  password: welcome
              metadata:
                labels:
                  potato: yam
                annotations:
                  style: mashed
      responses:
        '202':
          description: has failed the job with an appropriate error
          content:
            text/html:
              schema:
                type: string
              example: ''
        '403':
          description: returns an error saying the feature is disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        detail:
                          type: string
                        title:
                          type: string
                        code:
                          type: integer
                        test_mode_info:
                          type: object
                          properties:
                            detail:
                              type: string
                            title:
                              type: string
                            backtrace:
                              type: array
                              items:
                                type: string
                          required:
                          - detail
                          - title
                          - backtrace
                      required:
                      - detail
                      - title
                      - code
                      - test_mode_info
                required:
                - errors
              example:
                errors:
                - detail: 'Feature Disabled: space_scoped_private_broker_creation'
                  title: CF-FeatureDisabled
                  code: 330002
                  test_mode_info:
