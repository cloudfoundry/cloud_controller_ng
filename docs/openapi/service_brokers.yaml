    patch:
      summary: Update a service broker
      tags:
      - ServiceBroker
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 6a97a5b5-46c1-4525-b117-8b2e0586c699
        description: Unique identifier for the resource
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                url:
                  type: string
                authentication:
                  type: object
                  properties:
                    type:
                      type: string
                    credentials:
                      type: object
                      properties:
                        username:
                          type: string
                        password:
                          type: string
                      required:
                      - username
                      - password
                  required:
                  - type
                  - credentials
                metadata:
                  type: object
                  properties:
                    labels:
                      type: object
                      properties:
                        potato:
                          type: string
                      required:
                      - potato
                    annotations:
                      type: object
                      properties:
                        style:
                          type: string
                        amount:
                          type: string
                      required:
                      - style
                      - amount
                  required:
                  - labels
                  - annotations
            example:
              name: new-name
              url: http://example.org/broker-url
              authentication:
                type: basic
                credentials:
                  username: new-admin
                  password: now-welcome
              metadata:
                labels:
                  potato: sweet
                annotations:
                  style: mashed
                  amount: all
      responses:
        '200':
          description: updates the broker anyway
          content:
            application/json:
              schema:
                type: object
                properties:
                  guid:
                    type: string
                  created_at:
                    type: string
                  updated_at:
                    type: string
                  name:
                    type: string
                  url:
                    type: string
                  relationships:
                    type: object
                    properties: {}
                  metadata:
                    type: object
