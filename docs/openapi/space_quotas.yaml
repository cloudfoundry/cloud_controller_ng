    patch:
      summary: update
      tags:
      - SpaceQuota
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: space_quota_to_update_guid
      responses:
        '200':
          description: succeeds without changing the quota
          content:
            application/json:
              schema:
                type: object
                properties:
                  guid:
                    type: string
                  created_at:
                    type: string
                  updated_at:
                    type: string
                  name:
                    type: string
                  apps:
                    type: object
                    properties:
                      total_memory_in_mb:
                        nullable: true
                      per_process_memory_in_mb:
                        nullable: true
                      total_instances:
                        nullable: true
                      per_app_tasks:
                        type: integer
                      log_rate_limit_in_bytes_per_second:
                        nullable: true
                    required:
                    - total_memory_in_mb
                    - per_process_memory_in_mb
                    - total_instances
                    - per_app_tasks
                    - log_rate_limit_in_bytes_per_second
                  services:
                    type: object
                    properties:
                      paid_services_allowed:
                        type: boolean
                      total_service_instances:
                        type: integer
                      total_service_keys:
                        type: integer
                    required:
                    - paid_services_allowed
                    - total_service_instances
                    - total_service_keys
                  routes:
                    type: object
                    properties:
                      total_routes:
                        type: integer
                      total_reserved_ports:
                        nullable: true
                    required:
                    - total_routes
                    - total_reserved_ports
                  relationships:
                    type: object
                    properties:
                      organization:
                        type: object
                        properties:
                          data:
                            type: object
                            properties:
                              guid:
                                type: string
                            required:
                            - guid
                        required:
                        - data
                      spaces:
                        type: object
                        properties:
                          data:
                            type: array
                            items: {}
                        required:
                        - data
                    required:
                    - organization
                    - spaces
                  links:
                    type: object
                    properties:
                      self:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      organization:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                    required:
                    - self
                    - organization
                required:
                - guid
                - created_at
                - updated_at
                - name
                - apps
                - services
                - routes
                - relationships
                - links
              example:
                guid: space_quota_to_update_guid
                created_at: '2026-03-31T23:36:39Z'
                updated_at: '2026-03-31T23:36:39Z'
                name: don-quixote
                apps:
                  total_memory_in_mb:
                  per_process_memory_in_mb:
                  total_instances:
                  per_app_tasks: 9
                  log_rate_limit_in_bytes_per_second:
                services:
                  paid_services_allowed: false
                  total_service_instances: 14
                  total_service_keys: 600
                routes:
                  total_routes: 1000
                  total_reserved_ports:
                relationships:
                  organization:
                    data:
                      guid: organization-guid
                  spaces:
                    data: []
                links:
                  self:
                    href: http://api2.vcap.me/v3/space_quotas/space_quota_to_update_guid
                  organization:
                    href: http://api2.vcap.me/v3/organizations/organization-guid
        '404':
          description: returns a 404 with a helpful message
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        detail:
                          type: string
                        title:
                          type: string
                        code:
                          type: integer
                        test_mode_info:
                          type: object
                          properties:
