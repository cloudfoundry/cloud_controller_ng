    get:
      summary: Get a service credential binding
      tags:
      - ServiceCredentialBinding
      parameters:
      - name: bahamas
        in: query
        required: false
        schema:
          type: string
        example: yes-please
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 7e50585a-1098-48c0-8e3a-3469d8d04e30
        description: Unique identifier for the resource
      - name: include
        in: query
        required: false
        schema:
          type: string
        example: app
        description: 'Optionally include a list of unique related resources in the
          response. Valid values are: app, service_instance'
