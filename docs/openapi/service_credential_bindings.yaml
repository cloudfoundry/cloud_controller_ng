  "/v3/service_credential_bindings/{guid}/details":
    get:
      summary: Get a service credential binding details
      tags:
      - ServiceCredentialBinding
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 193e04b1-1052-4ae9-b7e6-52ba0a997bfc
      responses:
        '200':
          description: sets the right details
          content:
            application/json:
              schema:
                type: object
                properties:
                  credentials:
                    type: object
                    properties:
                      username:
                        type: string
                      password:
                        type: string
                      credhub-ref:
                        type: string
                      creds-key-1268:
                        type: string
                      creds-key-1270:
                        type: string
                      cred_key:
                        type: string
                      magic:
                        type: boolean
                  syslog_drain_url:
                    type: string
                  volume_mounts:
                    type: array
                    items:
                      type: string
                required:
                - credentials
              example:
                credentials:
                  username: cinnamon
                  password: foo
                  credhub-ref: "/secret/super/morish"
                  creds-key-1268: creds-val-1268
                  creds-key-1270: creds-val-1270
                  cred_key: creds-val-64
                  magic: true
                syslog_drain_url: http://syslog.example.com/wow
                volume_mounts:
                - foo
                - bar
        '404':
          description: returns an error
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        detail:
                          type: string
                        title:
                          type: string
                        code:
                          type: integer
                        test_mode_info:
                          type: object
                          properties:
                            detail:
                              type: string
                            title:
                              type: string
                            backtrace:
                              type: array
                              items:
                                type: string
                          required:
                          - detail
                          - title
                          - backtrace
                      required:
                      - detail
                      - title
                      - code
                      - test_mode_info
                required:
                - errors
              example:
                errors:
                - detail: Creation of service binding failed
                  title: CF-ResourceNotFound
                  code: 10010
                  test_mode_info:
                    detail: Creation of service binding failed
                    title: CF-ResourceNotFound
