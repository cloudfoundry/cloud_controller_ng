                            annotations:
                              type: object
                              properties: {}
                          required:
                          - labels
                          - annotations
                        links:
                          type: object
                          properties:
                            self:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                            route_reservations:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                            organization:
                              type: object
                              properties:
                                href:
