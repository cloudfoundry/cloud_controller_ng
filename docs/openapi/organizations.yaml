  "/v3/organizations/{guid}/domains":
    get:
      summary: List domains for an organization
      tags:
      - OrganizationsV3
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 74287ad7-0016-406f-a5d7-a8bff2695143
      - name: label_selector
        in: query
        required: false
        schema:
          type: string
        example: animal==dog
      responses:
        '200':
          description: returns a 200 and the filtered domains for "==" label selector
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination:
                    type: object
