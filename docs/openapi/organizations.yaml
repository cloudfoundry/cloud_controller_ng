    patch:
      summary: Update an organization
      tags:
      - OrganizationsV3
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 5eb1197e-f3ff-49f0-b335-7fa7d2086004
        description: Unique identifier for the resource
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                metadata:
                  type: object
                  properties:
                    labels:
                      type: object
                      properties:
                        freaky:
                          type: string
                        fruit:
                          nullable: true
                    annotations:
                      type: object
                      properties:
                        quality:
                          type: string
                      required:
                      - quality
                  required:
                  - labels
                suspended:
                  type: boolean
            example:
              name: New Name World
              metadata:
                labels:
                  freaky: thursday
                  fruit:
                annotations:
                  quality: p sus
              suspended: true
      responses:
        '200':
          description: updates the label metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  guid:
                    type: string
                  created_at:
                    type: string
                  updated_at:
                    type: string
                  name:
                    type: string
                  suspended:
                    type: boolean
                  relationships:
                    type: object
                    properties:
                      quota:
                        type: object
                        properties:
                          data:
                            type: object
                            properties:
                              guid:
                                type: string
                            required:
                            - guid
                        required:
                        - data
                    required:
                    - quota
                  metadata:
                    type: object
                    properties:
                      labels:
                        type: object
                        properties:
                          freaky:
                            type: string
                          animal:
                            type: string
                      annotations:
                        type: object
                        properties:
                          quality:
                            type: string
                    required:
                    - labels
                    - annotations
                  links:
                    type: object
                    properties:
                      self:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      domains:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      default_domain:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      quota:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                    required:
                    - self
                    - domains
                    - default_domain
                    - quota
                required:
                - guid
                - created_at
                - updated_at
                - name
                - suspended
                - relationships
                - metadata
                - links
              example:
                guid: 89ad58b3-72fd-4012-bfa6-10b3d8a422dc
                created_at: '2026-03-31T23:34:24Z'
                updated_at: '2026-03-31T23:34:24Z'
                name: Apocalypse World
                suspended: false
                relationships:
                  quota:
                    data:
                      guid: ec4787c5-6a95-4e79-b68d-37a26141c1c5
                metadata:
                  labels:
                    freaky: thursday
                    animal: horse
                  annotations:
                    quality: p sus
                links:
                  self:
                    href: http://api2.vcap.me/v3/organizations/89ad58b3-72fd-4012-bfa6-10b3d8a422dc
