  "/v3/organizations/{guid}/relationships/default_isolation_segment":
    get:
      summary: Get default isolation segment
      tags:
      - OrganizationsV3
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: b1fb7e40-f2f2-41e5-bc4d-e7a0e672e376
      responses:
        '200':
          description: shows the default isolation segment for the organization
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      guid:
                        type: string
                    required:
                    - guid
                  links:
                    type: object
                    properties:
                      self:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      related:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                    required:
                    - self
                    - related
                required:
                - data
                - links
              example:
                data:
                  guid: 9a75aa6a-7f91-40f8-a222-9bc8fb6b76a2
                links:
                  self:
                    href: http://api2.vcap.me/v3/organizations/b1fb7e40-f2f2-41e5-bc4d-e7a0e672e376/relationships/default_isolation_segment
                  related:
                    href: http://api2.vcap.me/v3/isolation_segments/9a75aa6a-7f91-40f8-a222-9bc8fb6b76a2
    patch:
      summary: Assign default isolation segment
      tags:
      - OrganizationsV3
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 892bf888-9ebf-405c-bce0-49d4f56ccef2
        description: Unique identifier for the resource
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    guid:
                      type: string
                  required:
                  - guid
              required:
              - data
            example:
              data:
                guid: 1f9331b1-2940-484b-8a7a-85996411c434
      responses:
        '200':
          description: updates the default isolation segment for the organization
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      guid:
                        type: string
                    required:
                    - guid
                  links:
                    type: object
                    properties:
                      self:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      related:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                    required:
                    - self
                    - related
                required:
                - data
                - links
              example:
                data:
                  guid: 1f9331b1-2940-484b-8a7a-85996411c434
                links:
                  self:
                    href: http://api2.vcap.me/v3/organizations/892bf888-9ebf-405c-bce0-49d4f56ccef2/relationships/default_isolation_segment
                  related:
                    href: http://api2.vcap.me/v3/isolation_segments/1f9331b1-2940-484b-8a7a-85996411c434
