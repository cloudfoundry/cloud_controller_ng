                              required:
                              - href
                            shared_organizations:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                          required:
                          - self
                          - route_reservations
                          - organization
                          - shared_organizations
                      required:
                      - guid
                      - created_at
                      - updated_at
                      - name
                      - internal
                      - router_group
                      - supported_protocols
                      - relationships
                      - metadata
                      - links
