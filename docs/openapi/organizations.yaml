  "/v3/organizations/{guid}/domains/default":
    get:
      summary: Get default domain
      tags:
      - OrganizationsV3
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 50ab1af8-0a15-4fb8-ba12-82d7bd58abbb
      responses:
        '401':
          description: returns 401 for Unauthenticated requests
