openapi: 3.0.3
info:
  title: Cloud Controller V3 API
  version: v3
  description: An org is a development account that an individual or multiple collaborators
    can own and use. All collaborators access an org with user accounts. Collaborators
    in an org share a resource quota plan, applications, services availability, and
    custom domains.
