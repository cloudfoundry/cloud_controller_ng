  "/v3/organizations/{guid}/users":
    get:
      summary: List users for an organization
      tags:
      - OrganizationsV3
      parameters:
      - name: created_ats[lt]
        in: query
        required: false
        schema:
          type: string
        example: '2020-05-26T18:47:03Z'
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 11f75f15-005c-4ba5-bf30-8ed30a38407b
        description: Unique identifier for the resource
      - name: guids
        in: query
        required: false
        schema:
          type: string
        example: uaa-id-3756
        description: Comma-delimited list of user guids to filter by
      - name: label_selector
        in: query
        required: false
        schema:
          type: string
        example: animal in (dog)
        description: A query string containing a list of label selector requirements
      - name: origins
        in: query
        required: false
        schema:
          type: string
        example: Okta
        description: Comma-delimited list of user origins (user stores) to filter
          by, for example, users authenticated by UAA have the origin "uaa"; users
          authenticated by an LDAP provider have the origin "ldap"; when filtering
          by origins, usernames must be included
      - name: partial_usernames
        in: query
        required: false
        schema:
          type: string
        example: b-mcjam
        description: Comma-delimited list of strings to search by. When using this
          query parameter, all the users that contain the string provided in their
          username will be returned. Mutually exclusive with usernames
      - name: updated_ats[lt]
        in: query
        required: false
        schema:
          type: string
        example: '2020-05-26T18:47:03Z'
      - name: usernames
        in: query
        required: false
        schema:
          type: string
        example: rob-mcjames
        description: Comma-delimited list of usernames to filter by. Mutually exclusive
          with partial_usernames
      responses:
        '200':
          description: returns 200 and filters
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination:
                    type: object
                    properties:
                      total_results:
                        type: integer
                      total_pages:
                        type: integer
                      first:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      last:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      next:
                        nullable: true
                      previous:
                        nullable: true
                    required:
                    - total_results
                    - total_pages
                    - first
                    - last
                    - next
                    - previous
                  resources:
                    type: array
                    items:
                      type: object
                      properties:
                        guid:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        username:
                          type: string
                          nullable: true
                        presentation_name:
                          type: string
                        origin:
                          type: string
                          nullable: true
                        metadata:
                          type: object
                          properties:
                            labels:
                              type: object
                              properties:
                                animal:
                                  type: string
                            annotations:
                              type: object
                              properties: {}
                          required:
                          - labels
                          - annotations
                        links:
                          type: object
                          properties:
                            self:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                          required:
                          - self
                      required:
                      - guid
                      - created_at
                      - updated_at
                      - username
                      - presentation_name
                      - origin
                      - metadata
                      - links
                required:
                - pagination
                - resources
              example:
                pagination:
                  total_results: 1
                  total_pages: 1
                  first:
                    href: http://api2.vcap.me/v3/organizations/11f75f15-005c-4ba5-bf30-8ed30a38407b/users?created_ats%5Blt%5D=2020-05-26T18%3A47%3A03Z&page=1&per_page=50
                  last:
                    href: http://api2.vcap.me/v3/organizations/11f75f15-005c-4ba5-bf30-8ed30a38407b/users?created_ats%5Blt%5D=2020-05-26T18%3A47%3A03Z&page=1&per_page=50
                  next:
                  previous:
                resources:
                - guid: '1'
                  created_at: '2020-05-26T18:47:01Z'
                  updated_at: '2026-03-31T23:34:26Z'
                  username:
                  presentation_name: '1'
                  origin:
                  metadata:
                    labels: {}
                    annotations: {}
                  links:
                    self:
                      href: http://api2.vcap.me/v3/users/1
