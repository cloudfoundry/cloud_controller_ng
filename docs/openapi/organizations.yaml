                              type: object
                              properties:
                                data:
                                  type: array
                                  items: {}
                              required:
                              - data
                          required:
                          - organization
                          - shared_organizations
                        metadata:
                          type: object
                          properties:
                            labels:
                              type: object
                              properties:
