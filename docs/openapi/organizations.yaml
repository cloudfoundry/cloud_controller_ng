  "/v3/spaces/{guid}":
    get:
      summary: Get a space
      tags:
      - SpacesV3
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: ce882032-1322-41e1-ba54-dea3757376ad
        description: Unique identifier for the resource
      responses:
        '404':
