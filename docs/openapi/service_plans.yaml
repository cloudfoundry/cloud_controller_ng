  "/v3/service_plans/{guid}/visibility":
    get:
      summary: Get a service plan visibility
      tags:
      - ServicePlanVisibility
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 622c1923-6449-40f9-8e72-e061abe5e826
      responses:
        '200':
          description: links to visibilities
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                required:
                - type
              example:
                type: public
tags:
- name: ServiceOffering
  description: Service plans represent the service plans offered by a service offering.
    A service offering will have one or more service plans. Service offerings and
    service plans are created and updated when a service broker is registered or updated.
