---
openapi: 3.0.3
info:
  title: Cloud Controller V3 API
  version: v3
servers: []
paths:
  "/v3/domains":
    get:
      summary: index
      tags:
      - Domain
      parameters:
      - name: guids
        in: query
        required: false
        schema:
          type: string
        example: domain2
      - name: label_selector
        in: query
        required: false
        schema:
          type: string
        example: santa
      - name: names
        in: query
        required: false
        schema:
          type: string
        example: domain2.com
      - name: organization_guids
        in: query
        required: false
        schema:
          type: string
        example: non-visible
      responses:
        '200':
          description: paginates the results
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination:
                    type: object
                    properties:
                      total_results:
                        type: integer
                      total_pages:
                        type: integer
                      first:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      last:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      next:
                        nullable: true
                      previous:
                        nullable: true
                    required:
                    - total_results
                    - total_pages
                    - first
                    - last
                    - next
                    - previous
                  resources:
                    type: array
                    items:
                      type: object
                      properties:
                        guid:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        name:
                          type: string
                        internal:
                          type: boolean
                        router_group:
                          nullable: true
                        supported_protocols:
                          type: array
                          items:
                            type: string
                        relationships:
                          type: object
                          properties:
                            organization:
                              type: object
                              properties:
                                data:
                                  type: object
                                  properties:
                                    guid:
                                      type: string
                                  required:
                                  - guid
                              required:
                              - data
                            shared_organizations:
                              type: object
                              properties:
                                data:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      guid:
                                        type: string
                                    required:
                                    - guid
                              required:
                              - data
                          required:
                          - organization
                          - shared_organizations
                        metadata:
                          type: object
                          properties:
                            labels:
                              type: object
                              properties:
                                animal:
                                  type: string
                                santa:
                                  type: string
                            annotations:
                              type: object
                              properties: {}
                          required:
                          - labels
                          - annotations
                        links:
                          type: object
                          properties:
                            self:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                            route_reservations:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                            organization:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                            shared_organizations:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                          required:
                          - self
                          - route_reservations
                          - organization
                          - shared_organizations
                      required:
                      - guid
                      - created_at
                      - updated_at
                      - name
                      - internal
                      - router_group
                      - supported_protocols
                      - relationships
                      - metadata
                      - links
                required:
                - pagination
                - resources
              example:
                pagination:
                  total_results: 1
                  total_pages: 1
                  first:
                    href: http://api2.vcap.me/v3/domains?names=domain2.com&page=1&per_page=50
                  last:
                    href: http://api2.vcap.me/v3/domains?names=domain2.com&page=1&per_page=50
                  next:
                  previous:
                resources:
                - guid: domain2
                  created_at: '2026-03-31T23:33:28Z'
                  updated_at: '2026-03-31T23:33:28Z'
                  name: domain2.com
                  internal: false
                  router_group:
                  supported_protocols:
                  - http
                  relationships:
                    organization:
                      data:
                        guid: non-visible
                    shared_organizations:
                      data:
                      - guid: d0a2fbb4-c82a-40a3-84d3-d1062ffb63c9
                  metadata:
                    labels: {}
                    annotations: {}
                  links:
                    self:
                      href: http://api2.vcap.me/v3/domains/domain2
                    route_reservations:
                      href: http://api2.vcap.me/v3/domains/domain2/route_reservations
                    organization:
                      href: http://api2.vcap.me/v3/organizations/non-visible
                    shared_organizations:
                      href: http://api2.vcap.me/v3/domains/domain2/relationships/shared_organizations
