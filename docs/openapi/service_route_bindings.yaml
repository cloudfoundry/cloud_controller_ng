    get:
      summary: Get parameters for a route binding
      tags:
      - ServiceRouteBinding
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: e610f040-3f5a-4af2-949b-78f39ec602f1
      responses:
        '200':
          description: correctly parses all data types and returns the desired JSON
            string
          content:
            application/json:
              schema:
                type: object
                properties:
                  abra:
                    type: string
                  kadabra:
                    type: string
                  boolean:
                    type: boolean
                  string:
                    type: string
                  int:
                    type: integer
                  float:
                    type: number
                    format: float
                  optional:
                    nullable: true
                  object:
                    type: object
                    properties:
                      a:
                        type: string
                    required:
                    - a
                  array:
                    type: array
                    items:
                      type: string
              example:
                abra: kadabra
                kadabra: alakazan
                boolean: true
                string: a string
                int: 123
                float: 3.14159
                optional:
                object:
                  a: b
                array:
