---
openapi: 3.0.3
info:
  title: Cloud Controller V3 API
  version: v3
  description: Service route bindings are relations between a service instance and
    a route. Not all service instances support route binding. In order to bind to
    a managed service instance, the service instance should be created from a service
    offering that has requires route forwarding (`requires=[route_forwarding]`). In
    order to bind to a user-provided service instance, the service instance must have
    `route_service_url` set.
servers: []
paths:
  "/v3/jobs/{guid}":
    get:
      summary: Get a job
      tags:
      - V3::Job
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 8b70f5c7-d1c0-4d0c-9309-7afa0131b39b
      responses:
        '200':
          description: responds with a job resource
          content:
            application/json:
              schema:
                type: object
                properties:
                  guid:
                    type: string
                  created_at:
                    type: string
                  updated_at:
                    type: string
                  operation:
                    type: string
                  state:
                    type: string
                  errors:
                    type: array
                    items: {}
                  warnings:
                    type: array
                    items: {}
                  links:
                    type: object
                    properties:
                      self:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      service_route_binding:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                    required:
                    - self
                    - service_route_binding
                required:
                - guid
                - created_at
                - updated_at
                - operation
                - state
                - errors
                - warnings
                - links
              example:
                guid: 8b70f5c7-d1c0-4d0c-9309-7afa0131b39b
                created_at: '2026-03-31T23:33:45Z'
                updated_at: '2026-03-31T23:33:45Z'
                operation: service_route_bindings.delete
                state: PROCESSING
                errors: []
                warnings: []
                links:
                  self:
                    href: http://api2.vcap.me/v3/jobs/8b70f5c7-d1c0-4d0c-9309-7afa0131b39b
                  service_route_binding:
                    href: http://api2.vcap.me/v3/service_route_bindings/8154fefa-ce50-4f9b-9118-58cc6d45d026
  "/v3/service_route_bindings":
    get:
      summary: List service route bindings
      tags:
      - ServiceRouteBinding
      parameters:
      - name: guids
        in: query
        required: false
        schema:
          type: string
        example: edf38682-c4e5-4e3c-b5f3-9a63a469b07a,b06281fb-2de2-4053-bf70-b7272092cb7d
      - name: include
        in: query
        required: false
        schema:
          type: string
        example: service_instance
      - name: label_selector
        in: query
        required: false
        schema:
          type: string
        example: "!fruit,env=prod,animal in (dog,horse)"
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
        example: 1
      - name: route_guids
        in: query
        required: false
        schema:
          type: string
        example: 46583b31-f937-4a59-9749-13888b6e7b87,c0e34888-5827-465a-b9b4-9b79adc0e8aa
      - name: service_instance_guids
        in: query
        required: false
        schema:
          type: string
        example: a7833ccc-bac9-4648-9af2-cca80eb4d81c,dd39e049-e3a8-443a-b15e-4dcf9f00841e
      - name: service_instance_names
        in: query
        required: false
        schema:
          type: string
        example: name-13726,name-13732
      responses:
        '200':
          description: eagerly loads service_instances to efficiently access service_instance_guid
