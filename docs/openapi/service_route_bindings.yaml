                          - annotations
                        relationships:
                          type: object
                          properties:
                            service_instance:
                              type: object
                              properties:
                                data:
                                  type: object
                                  properties:
                                    guid:
                                      type: string
                                  required:
                                  - guid
                              required:
                              - data
                            route:
                              type: object
                              properties:
                                data:
                                  type: object
                                  properties:
                                    guid:
                                      type: string
                                  required:
                                  - guid
                              required:
                              - data
                          required:
