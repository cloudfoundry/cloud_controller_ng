                              - annotations
                            relationships:
                              type: object
                              properties:
                                space:
                                  type: object
                                  properties:
                                    data:
                                      type: object
                                      properties:
                                        guid:
                                          type: string
                                      required:
                                      - guid
                                  required:
                                  - data
                                domain:
                                  type: object
                                  properties:
                                    data:
                                      type: object
                                      properties:
                                        guid:
                                          type: string
                                      required:
