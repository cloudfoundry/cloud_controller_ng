    post:
      summary: diff_manifest
      tags:
      - SpaceManifest
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 20e169a5-ab88-4981-9ddc-9552d1257cf7
      requestBody:
        content:
          application/x-yaml:
            schema:
              type: object
              properties: {}
            example: {}
      responses:
        '201':
          description: returns a diff that reflects the change at the app level
