    post:
      summary: Share a route with other spaces (experimental)
      tags:
      - Route
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 3b629902-e64f-4432-8f8f-953b985d6928
        description: Unique identifier for the resource
      responses:
        '200':
          description: reports that the route is now shared
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        guid:
                          type: string
                      required:
                      - guid
                  links:
                    type: object
                    properties:
                      self:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                    required:
                    - self
                required:
                - data
                - links
              example:
                data:
                - guid: 7c84c5b9-fe32-45b4-b5bf-d0b8de109a33
                - guid: 1aaf7815-c8bb-4011-a096-486f77d7fd19
                links:
                  self:
                    href: http://api2.vcap.me/v3/routes/6c47af32-31e3-482b-9cd2-0d902f5683a7/relationships/shared_spaces
        '403':
          description: makes users unable to share routes
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        detail:
                          type: string
                        title:
                          type: string
                        code:
