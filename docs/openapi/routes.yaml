      - name: hosts
        in: query
        required: false
        schema:
          type: string
        example: ''
        description: Comma-delimited list of hostnames to filter by
      - name: include
        in: query
        required: false
        schema:
          type: string
        example: domain
        description: Optionally include a list of unique related resources in the
          response  Valid values are domain, space.organization, space
      - name: label_selector
        in: query
        required: false
        schema:
          type: string
        example: animal in (dog)
        description: A query string containing a list of label selector requirements
      - name: organization_guids
        in: query
        required: false
        schema:
