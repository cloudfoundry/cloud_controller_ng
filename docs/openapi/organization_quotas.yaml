    patch:
      summary: update
      tags:
      - OrganizationQuota
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 61dc6872-631f-444f-87b8-454751c2180c
      responses:
        '200':
          description: succeeds without changing the quota
          content:
            application/json:
              schema:
                type: object
                properties:
                  guid:
                    type: string
                  created_at:
                    type: string
                  updated_at:
                    type: string
                  name:
                    type: string
                  apps:
                    type: object
                    properties:
                      total_memory_in_mb:
                        nullable: true
                      per_process_memory_in_mb:
                        nullable: true
                      total_instances:
                        nullable: true
                      per_app_tasks:
                        type: integer
                      log_rate_limit_in_bytes_per_second:
                        nullable: true
                    required:
                    - total_memory_in_mb
