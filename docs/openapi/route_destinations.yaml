    patch:
      summary: replace_destinations
      tags:
      - Route
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 04c5ea63-ca61-4a4b-8544-1bc5ee9b9f1d
      responses:
        '200':
          description: creates route destinations with weights
          content:
            application/json:
              schema:
                type: object
                properties:
                  destinations:
                    type: array
                    items:
                      type: object
                      properties:
                        guid:
                          type: string
                        app:
                          type: object
                          properties:
                            guid:
                              type: string
                            process:
                              type: object
                              properties:
                                type:
                                  type: string
                              required:
                              - type
                          required:
                          - guid
                          - process
                        weight:
                          nullable: true
                          type: integer
                        port:
                          type: integer
                        protocol:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                      required:
                      - guid
                      - app
                      - weight
                      - port
                      - protocol
                      - created_at
                      - updated_at
                  links:
                    type: object
                    properties:
                      self:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      route:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                    required:
                    - self
                    - route
                required:
                - destinations
                - links
              example:
                destinations:
                - guid: aea20937-8f7c-4103-9783-ff6c1fa17654
                  app:
                    guid: 94941a2d-d485-427d-b125-2e2691535a1d
                    process:
                      type: worker
                  weight: 20
                  port: 8080
                  protocol: http1
                  created_at: '2026-03-31T23:33:17Z'
                  updated_at: '2026-03-31T23:33:17Z'
                - guid: becc21e5-b513-43ce-9adc-bb095668dfc6
                  app:
                    guid: 94941a2d-d485-427d-b125-2e2691535a1d
                    process:
                      type: web
                  weight: 80
                  port: 8080
                  protocol: http1
                  created_at: '2026-03-31T23:33:17Z'
                  updated_at: '2026-03-31T23:33:17Z'
                links:
                  self:
                    href: http://api2.vcap.me/v3/routes/72e65029-929a-41d7-91fc-e63c58d57c2d/destinations
                  route:
                    href: http://api2.vcap.me/v3/routes/72e65029-929a-41d7-91fc-e63c58d57c2d
        '401':
          description: returns 401 for Unauthenticated requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        detail:
                          type: string
                        title:
                          type: string
                        code:
                          type: integer
                        test_mode_info:
                          type: object
                          properties:
                            detail:
                              type: string
                            title:
                              type: string
                            backtrace:
                              type: array
                              items:
                                type: string
                          required:
                          - detail
                          - title
                          - backtrace
                      required:
                      - detail
                      - title
                      - code
                      - test_mode_info
                required:
                - errors
              example:
                errors:
                - detail: Authentication error
                  title: CF-NotAuthenticated
                  code: 10002
                  test_mode_info:
                    detail: Authentication error
