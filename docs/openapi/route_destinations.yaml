                          - guid
                          - process
                        weight:
                          nullable: true
                        port:
                          type: integer
                        protocol:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                      required:
                      - guid
                      - app
                      - weight
                      - port
                      - protocol
                      - created_at
                      - updated_at
                  links:
                    type: object
                    properties:
                      self:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      route:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                    required:
                    - self
                    - route
                required:
                - destinations
                - links
              example:
                destinations:
                - guid: 275385c7-23a9-4b27-9ab1-437e610cfd91
                  app:
                    guid: 7034664a-91f4-405b-9162-5ee4954cd03a
