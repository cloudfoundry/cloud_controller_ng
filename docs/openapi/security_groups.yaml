---
openapi: 3.0.3
info:
  title: Cloud Controller V3 API
  version: v3
  description: Security groups are collections of egress traffic rules that can be
    applied to the staging or running state of applications. Security groups can either
    be applied globally or at the space-level. Security groups can only allow (whitelist)
    traffic. They cannot be used to disallow (blacklist) traffic. IPv6 security groups
    can be configured if `cc.enable_ipv6` is set to `true`.
servers: []
paths:
  "/v3/security_groups":
    get:
      summary: List security groups
      tags:
      - SecurityGroup
      parameters:
      - name: blork
        in: query
        required: false
        schema:
          type: string
        example: busted
      - name: globally_enabled_running
        in: query
        required: false
        schema:
          type: string
        example: 'true'
        description: If true, only include the security groups that are enabled for
          running
      - name: globally_enabled_staging
        in: query
        required: false
        schema:
          type: string
        example: 'true'
        description: If true, only include the security groups that are enabled for
          staging
      - name: guids
        in: query
        required: false
        schema:
          type: string
        example: security_group_2_guid
        description: Comma-delimited list of security group guids to filter by
      - name: names
        in: query
        required: false
        schema:
          type: string
        example: name-48136
        description: Comma-delimited list of security group names to filter by
      - name: running_space_guids
        in: query
        required: false
        schema:
          type: string
        example: space-guid
        description: Comma-delimited list of space guids to filter by
      - name: staging_space_guids
        in: query
        required: false
        schema:
          type: string
        example: space-guid
        description: Comma-delimited list of space guids to filter by
      responses:
        '200':
          description: filters on globally_enabled_running
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination:
                    type: object
                    properties:
                      total_results:
                        type: integer
                      total_pages:
                        type: integer
                      first:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      last:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      next:
                        nullable: true
                      previous:
                        nullable: true
                    required:
                    - total_results
                    - total_pages
                    - first
                    - last
                    - next
                    - previous
                  resources:
                    type: array
                    items:
                      type: object
                      properties:
                        guid:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        name:
                          type: string
                        rules:
                          type: array
                          items:
                            type: object
                            properties:
                              protocol:
                                type: string
                              ports:
                                type: string
                              destination:
                                type: string
                            required:
                            - protocol
                            - ports
                            - destination
                        globally_enabled:
                          type: object
                          properties:
                            running:
                              type: boolean
                            staging:
                              type: boolean
                          required:
                          - running
                          - staging
                        relationships:
                          type: object
                          properties:
                            running_spaces:
                              type: object
                              properties:
                                data:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      guid:
                                        type: string
                                    required:
                                    - guid
                              required:
                              - data
                            staging_spaces:
                              type: object
                              properties:
                                data:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      guid:
                                        type: string
                                    required:
                                    - guid
                              required:
                              - data
                          required:
                          - running_spaces
                          - staging_spaces
                        links:
                          type: object
                          properties:
                            self:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                          required:
                          - self
                      required:
                      - guid
                      - created_at
                      - updated_at
                      - name
                      - rules
                      - globally_enabled
                      - relationships
                      - links
                required:
                - pagination
                - resources
              example:
                pagination:
                  total_results: 1
                  total_pages: 1
                  first:
                    href: http://api2.vcap.me/v3/security_groups?globally_enabled_running=true&page=1&per_page=50
                  last:
                    href: http://api2.vcap.me/v3/security_groups?globally_enabled_running=true&page=1&per_page=50
                  next:
                  previous:
                resources:
                - guid: security_group_3_guid
                  created_at: '2026-03-31T23:37:05Z'
                  updated_at: '2026-03-31T23:37:05Z'
                  name: name-48155
                  rules:
                  - protocol: udp
                    ports: '8080'
                    destination: 198.41.191.47/1
                  globally_enabled:
                    running: true
                    staging: true
                  relationships:
                    running_spaces:
                      data: []
                    staging_spaces:
                      data: []
                  links:
                    self:
                      href: http://api2.vcap.me/v3/security_groups/security_group_3_guid
