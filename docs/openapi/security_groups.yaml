    patch:
      summary: Update a security group
      tags:
      - SecurityGroup
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 300695f4-c4a4-491d-baea-1569e82f9200
        description: Unique identifier for the resource
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                globally_enabled:
                  type: object
                  properties:
                    staging:
                      type: boolean
                  required:
                  - staging
            example:
              globally_enabled:
                staging: true
      responses:
        '200':
          description: only updates the requested fields
          content:
            application/json:
