---
openapi: 3.0.3
info:
  title: Cloud Controller V3 API
  version: v3
  description: 'Droplets are the result of staging an application package. There are
    two types (lifecycles) of droplets: buildpack and docker. In the case of the buildpacks,
    the droplet contains the bits produced by the buildpack, typically application
    code and dependencies. After an application is created and packages are uploaded,
    a droplet must be created via a [build](#builds) in order for an application to
    be deployed or tasks to be run. The current droplet [must be assigned](#set-current-droplet)
    to an application before it may be started. When [tasks are created](#create-a-task),
    they either use a specific droplet guid, or use the current droplet assigned to
    an application.'
servers: []
paths:
  "/v3/apps/{app_guid}/droplets":
    get:
      summary: List droplets for an app
      tags:
      - Droplet
      parameters:
      - name: app_guid
        in: path
        required: true
        schema:
          type: string
        example: 7b5e13ad-2c7b-40f9-8552-3f1cbefec459
        description: Unique identifier for the resource
      - name: current
        in: query
        required: false
        schema:
          type: string
        example: 'true'
        description: If true, only include the droplet currently assigned to the app
      - name: label_selector
        in: query
        required: false
        schema:
          type: string
        example: fruit
        description: A query string containing a list of label selector requirements
      - name: states
        in: query
        required: false
        schema:
          type: string
        example: STAGED
        description: Comma-delimited list of droplet states to filter by
      responses:
        '200':
          description: returns an empty list
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination:
                    type: object
                    properties:
                      total_results:
                        type: integer
                      total_pages:
                        type: integer
                      first:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      last:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      next:
                        nullable: true
                      previous:
                        nullable: true
                    required:
                    - total_results
                    - total_pages
                    - first
                    - last
                    - next
                    - previous
                  resources:
                    type: array
                    items:
                      type: object
                      properties:
                        guid:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        state:
                          type: string
                        error:
                          type: string
                        lifecycle:
                          type: object
                          properties:
                            type:
                              type: string
                            data:
                              type: object
                              properties: {}
                          required:
                          - type
                          - data
                        checksum:
                          type: object
                          properties:
                            type:
                              type: string
                            value:
                              type: string
                          required:
                          - type
                          - value
                          nullable: true
                        buildpacks:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              detect_output:
                                nullable: true
                              buildpack_name:
                                nullable: true
                              version:
                                nullable: true
                            required:
                            - name
                            - detect_output
                            - buildpack_name
                            - version
                        stack:
                          type: string
                        image:
                          nullable: true
                        execution_metadata:
                          type: string
                        process_types:
                          type: object
                          properties:
                            redacted_message:
                              type: string
                          required:
                          - redacted_message
                        relationships:
                          type: object
                          properties:
                            app:
                              type: object
                              properties:
                                data:
                                  type: object
                                  properties:
                                    guid:
                                      type: string
                                  required:
                                  - guid
                              required:
                              - data
                          required:
                          - app
                        metadata:
                          type: object
                          properties:
                            labels:
                              type: object
                              properties:
                                seed:
                                  type: string
                                  nullable: true
                                fruit:
                                  type: string
                                  nullable: true
                            annotations:
                              type: object
                              properties: {}
                          required:
                          - labels
                          - annotations
                        links:
                          type: object
                          properties:
                            self:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                            app:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                            assign_current_droplet:
                              type: object
