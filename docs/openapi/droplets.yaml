        description: Comma-delimited list of droplet guids to filter by
      - name: label_selector
        in: query
        required: false
        schema:
          type: string
        example: "!fruit,animal in (dog,horse),env=prod"
        description: A query string containing a list of label selector requirements
      - name: order_by
        in: query
        required: false
        schema:
          type: string
        example: "-created_at"
        description: Value to sort by. Defaults to ascending; prepend with - to sort
          descending.  Valid values are createdat and updatedat
      - name: organization_guids
        in: query
        required: false
        schema:
          type: string
        example: f2dac97b-3df1-4d3e-9f6d-8b9554dc5f51
