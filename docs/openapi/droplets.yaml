                                href:
                                  type: string
                                method:
                                  type: string
                              required:
                              - href
                              - method
                            package:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                            download:
                              type: object
                              properties:
                                href:
                                  type: string
                              required:
                              - href
                              nullable: true
                          required:
                          - self
                          - app
                          - assign_current_droplet
                          - package
                      required:
                      - guid
                      - created_at
                      - updated_at
                      - state
                      - error
                      - lifecycle
                      - checksum
                      - buildpacks
                      - stack
                      - image
                      - execution_metadata
                      - process_types
                      - relationships
                      - metadata
                      - links
                required:
                - pagination
                - resources
              example:
                pagination:
                  total_results: 0
                  total_pages: 1
                  first:
                    href: http://api2.vcap.me/v3/apps/7b5e13ad-2c7b-40f9-8552-3f1cbefec459/droplets?current=true&page=1&per_page=50
                  last:
                    href: http://api2.vcap.me/v3/apps/7b5e13ad-2c7b-40f9-8552-3f1cbefec459/droplets?current=true&page=1&per_page=50
                  next:
                  previous:
                resources: []
