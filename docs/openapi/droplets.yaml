  "/v3/jobs/{guid}":
    get:
      summary: Get a job
      tags:
      - V3::Job
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 2641e722-d104-47cc-b9ac-fd9710d5d5b1
      responses:
        '200':
          description: enqueues a processing job
          content:
            application/json:
              schema:
                type: object
                properties:
                  guid:
                    type: string
                  created_at:
                    type: string
                  updated_at:
                    type: string
                  operation:
                    type: string
                  state:
                    type: string
                  errors:
                    type: array
                    items: {}
                  warnings:
                    type: array
                    items: {}
                  links:
                    type: object
                    properties:
                      self:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      droplet:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                    required:
                    - self
                    - droplet
                required:
                - guid
                - created_at
                - updated_at
                - operation
                - state
                - errors
                - warnings
                - links
              example:
                guid: 2641e722-d104-47cc-b9ac-fd9710d5d5b1
                created_at: '2026-03-31T23:32:48Z'
                updated_at: '2026-03-31T23:32:48Z'
                operation: droplet.upload
                state: PROCESSING
                errors: []
                warnings: []
                links:
                  self:
                    href: http://api2.vcap.me/v3/jobs/2641e722-d104-47cc-b9ac-fd9710d5d5b1
                  droplet:
                    href: http://api2.vcap.me/v3/droplets/e7c705e7-0cbe-4fe8-9d92-8f8a9bfa44ff
  "/v3/packages/{package_guid}/droplets":
    get:
      summary: List droplets for a package
      tags:
      - Droplet
      parameters:
      - name: label_selector
        in: query
        required: false
        schema:
          type: string
        example: fruit
        description: A query string containing a list of label selector requirements
      - name: package_guid
        in: path
        required: true
        schema:
          type: string
        example: 43a97d80-dde0-4ebb-a649-b587d4aaa506
        description: Unique identifier for the resource
      - name: states
        in: query
        required: false
        schema:
          type: string
        example: STAGED
        description: Comma-delimited list of droplet states to filter by
      responses:
        '200':
          description: returns only the packages for the app with specified labels
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination:
                    type: object
                    properties:
                      total_results:
                        type: integer
                      total_pages:
                        type: integer
                      first:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      last:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      next:
                        nullable: true
                      previous:
                        nullable: true
                    required:
                    - total_results
                    - total_pages
                    - first
                    - last
                    - next
                    - previous
                  resources:
                    type: array
                    items:
                      type: object
                      properties:
                        guid:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        state:
                          type: string
                        error:
                          type: string
                        lifecycle:
                          type: object
                          properties:
                            type:
