        example: 26aa6d1c-7f42-4b22-916e-9c23cf93fc01
        description: Comma-delimited list of app guids to filter by
      - name: created_ats[lt]
        in: query
        required: false
        schema:
          type: string
        example: '2020-05-26T18:47:03Z'
      - name: guids
        in: query
        required: false
        schema:
          type: string
