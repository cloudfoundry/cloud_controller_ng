  "/v3/droplets/{guid}":
    delete:
      summary: Delete a droplet
      tags:
      - Droplet
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: 6a9c9dcb-6fe3-4590-87db-e7d2f3c3e09a
      responses:
        '422':
          description: does not allow deletion
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        detail:
                          type: string
                        title:
                          type: string
                        code:
                          type: integer
                        test_mode_info:
                          type: object
                          properties:
                            detail:
                              type: string
                            title:
                              type: string
                            backtrace:
                              type: array
                              items:
                                type: string
                          required:
                          - detail
                          - title
                          - backtrace
                      required:
                      - detail
                      - title
                      - code
                      - test_mode_info
                required:
                - errors
