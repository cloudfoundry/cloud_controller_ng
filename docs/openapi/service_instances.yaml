    patch:
      summary: update
      tags:
      - ServiceInstancesV3
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
        example: no-such-instance
      responses:
        '200':
          description: updates the a service instance in the database
          content:
            application/json:
              schema:
                type: object
                properties:
                  guid:
                    type: string
                  created_at:
                    type: string
                  updated_at:
                    type: string
                  name:
                    type: string
                  tags:
                    type: array
                    items:
                      type: string
                  last_operation:
                    type: object
                    properties:
                      type:
                        type: string
                      state:
                        type: string
                      description:
                        nullable: true
                        type: string
                      updated_at:
                        type: string
                      created_at:
                        type: string
                    required:
                    - type
                    - state
                    - description
                    - updated_at
                    - created_at
                  type:
                    type: string
                  maintenance_info:
                    type: object
                    properties: {}
                  upgrade_available:
                    type: boolean
                  dashboard_url:
                    nullable: true
                  relationships:
                    type: object
                    properties:
                      space:
                        type: object
                        properties:
                          data:
                            type: object
                            properties:
                              guid:
                                type: string
                            required:
                            - guid
                        required:
                        - data
                      service_plan:
                        type: object
                        properties:
                          data:
                            type: object
                            properties:
                              guid:
                                type: string
                            required:
                            - guid
                        required:
                        - data
                    required:
                    - space
                  metadata:
                    type: object
                    properties:
                      labels:
                        type: object
                        properties:
                          potato:
                            type: string
                          style:
                            type: string
                          pre.fix/tail:
                            type: string
                          distance:
                            type: string
                          unit:
                            type: string
                          foo:
                            type: string
                      annotations:
                        type: object
                        properties:
                          potato:
                            type: string
                          style:
                            type: string
                          pre.fix/fox:
                            type: string
                          location:
                            type: string
                          alpha:
                            type: string
                    required:
                    - labels
                    - annotations
                  links:
                    type: object
                    properties:
                      self:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      space:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      service_credential_bindings:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      service_route_bindings:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      service_plan:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      parameters:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      shared_spaces:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                      credentials:
                        type: object
                        properties:
                          href:
                            type: string
                        required:
                        - href
                    required:
                    - self
                    - space
                    - service_credential_bindings
                    - service_route_bindings
                  syslog_drain_url:
                    type: string
                  route_service_url:
                    type: string
                required:
                - guid
                - created_at
                - updated_at
                - name
                - tags
                - last_operation
                - type
                - relationships
                - metadata
                - links
