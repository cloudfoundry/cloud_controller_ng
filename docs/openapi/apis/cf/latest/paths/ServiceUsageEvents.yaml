/v3/service_usage_events:
  get:
    summary: List service usage events
    description: Retrieve all service usage events the user has access to.
    operationId: listServiceUsageEvents
    tags:
      - Service Usage Events
    parameters:
      - $ref: ../components/parameters/Page.yaml
      - $ref: ../components/parameters/PerPage.yaml
      - $ref: ../components/parameters/OrderBy.yaml
      - $ref: ../components/parameters/CreatedAts.yaml
      - name: after_guid
        in: query
        description: Filters out events before and including the event with the given guid.
        schema:
          type: string
      - name: guids
        in: query
        description: Comma-delimited list of usage event guids to filter by.
        schema:
          type: array
          items:
            type: string
      - name: service_instance_types
        in: query
        description: Comma-delimited list of service instance types to filter by; valid values are `managed_service_instance` and `user_provided_service_instance`
        schema:
          type: array
          items:
            type: string
            enum:
              - managed_service_instance
              - user_provided_service_instance
      - name: service_offering_guids
        in: query
        description: Comma-delimited list of service offering guids to filter by
        schema:
          type: array
          items:
            type: string
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: ../components/schemas/ServiceUsageEventList.yaml
            examples:
              default:
                summary: default
                value:
                  pagination:
                    total_results: 2
                    total_pages: 2
                    first:
                      href: https://api.example.org<%= path %>?page=1&per_page=1
                    last:
                      href: https://api.example.org<%= path %>?page=2&per_page=1
                    next:
                      href: https://api.example.org<%= path %>?page=2&per_page=1
                    previous: null
                  resources:
                    - guid: 123e4567-e89b-12d3-a456-426614174000
                      created_at: '2020-05-28T12:34:56Z'
                      updated_at: '2020-05-28T12:34:56Z'
                      state: CREATED
                      space:
                        guid: 123e4567-e89b-12d3-a456-426614174000
                        name: name-1664
                      organization:
                        guid: 123e4567-e89b-12d3-a456-426614174000
                      service_instance:
                        guid: 123e4567-e89b-12d3-a456-426614174000
                        name: name-1982
                        type: managed_service_instance
                      service_plan:
                        guid: 123e4567-e89b-12d3-a456-426614174000
                        name: name-1983
                      service_offering:
                        guid: 123e4567-e89b-12d3-a456-426614174000
                        name: label-64
