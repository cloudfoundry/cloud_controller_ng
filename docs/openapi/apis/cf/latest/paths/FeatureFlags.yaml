/v3/feature_flags:
  get:
    summary: List feature flags
    description: Retrieve all feature_flags.
    operationId: listFeatureFlags
    tags:
      - Feature Flags
    parameters:
      - $ref: ../components/parameters/Page.yaml
      - $ref: ../components/parameters/PerPage.yaml
      - $ref: ../components/parameters/OrderBy.yaml
      - name: updated_ats
        in: query
        required: false
        schema:
          type: string
        description: |
          Timestamp to filter by. When filtering on equality, several comma-delimited timestamps may be passed.
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: ../components/schemas/FeatureFlagList.yaml
            examples:
              default:
                summary: default
                value:
                  pagination:
                    total_results: 3
                    total_pages: 2
                    first:
                      href: https://api.example.org/v3/feature_flags?page=1&per_page=2
                    last:
                      href: https://api.example.org/v3/feature_flags?page=2&per_page=2
                    next:
                      href: https://api.example.org/v3/feature_flags?page=2&per_page=2
                    previous: null
                  resources:
                    - name: my_feature_flag
                      enabled: true
                      updated_at: '2016-10-17T20:00:42Z'
                      custom_error_message: error message the user sees
                      links:
                        self:
                          href: https://api.example.org/v3/feature_flags/my_feature_flag
                    - name: my_second_feature_flag
                      enabled: false
                      updated_at: null
                      custom_error_message: null
                      links:
                        self:
                          href: https://api.example.org/v3/feature_flags/my_second_feature_flag
      '400':
        $ref: ../components/responses/BadRequest.yaml
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '409':
        $ref: ../components/responses/Conflict.yaml
      '422':
        $ref: ../components/responses/UnprocessableEntity.yaml
      '500':
        $ref: ../components/responses/500.yaml
      '502':
        $ref: ../components/responses/BadGateway.yaml
      '503':
        $ref: ../components/responses/ServiceUnavailable.yaml
/v3/feature_flags/{name}:
  get:
    summary: Get a feature flag
    description: Get a feature flag.
    operationId: getFeatureFlag
    tags:
      - Feature Flags
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          enum:
            - app_bits_upload
            - app_scaling
            - diego_docker
            - diego_cnb
            - env_var_visibility
            - hide_marketplace_from_unauthenticated_users
            - private_domain_creation
            - resource_matching
            - route_creation
            - route_sharing
            - service_instance_creation
            - service_instance_sharing
            - set_roles_by_username
            - space_developer_env_var_visibility
            - space_scoped_private_broker_creation
            - task_creation
            - unset_roles_by_username
            - user_org_creation
        description: The name of the feature flag
    responses:
      '200':
        description: Successfully retrieved feature flag
        content:
          application/json:
            schema:
              $ref: ../components/schemas/FeatureFlag.yaml
            examples:
              default:
                summary: default
                value:
                  name: my_feature_flag
                  enabled: true
                  updated_at: '2016-10-17T20:00:42Z'
                  custom_error_message: error message the user sees
                  links:
                    self:
                      href: https://api.example.org/v3/feature_flags/my_feature_flag
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
  patch:
    summary: Update a feature flag
    description: Update a feature flag.
    operationId: updateFeatureFlag
    tags:
      - Feature Flags
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          enum:
            - app_bits_upload
            - app_scaling
            - diego_docker
            - diego_cnb
            - env_var_visibility
            - hide_marketplace_from_unauthenticated_users
            - private_domain_creation
            - resource_matching
            - route_creation
            - route_sharing
            - service_instance_creation
            - service_instance_sharing
            - set_roles_by_username
            - space_developer_env_var_visibility
            - space_scoped_private_broker_creation
            - task_creation
            - unset_roles_by_username
            - user_org_creation
        description: The name of the feature flag
    requestBody:
      description: Feature flag object that needs to be updated
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              enabled:
                type: boolean
                description: Whether the feature flag is enabled
              custom_error_message:
                type: string
                description: The error string returned by the API when a client performs an action disabled by the feature flag
          examples:
            default:
              summary: default
              value:
                enabled: true
                custom_error_message: error message the user sees
    responses:
      '200':
        description: Successfully updated feature flag
        content:
          application/json:
            schema:
              $ref: ../components/schemas/FeatureFlag.yaml
            examples:
              default:
                summary: default
                value:
                  name: my_feature_flag
                  enabled: true
                  updated_at: '2016-10-17T20:00:42Z'
                  custom_error_message: error message the user sees
                  links:
                    self:
                      href: https://api.example.org/v3/feature_flags/my_feature_flag
      '400':
        $ref: ../components/responses/BadRequest.yaml
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
      '409':
        $ref: ../components/responses/Conflict.yaml
      '422':
        $ref: ../components/responses/UnprocessableEntity.yaml
      '500':
        $ref: ../components/responses/500.yaml
      '503':
        $ref: ../components/responses/ServiceUnavailable.yaml
