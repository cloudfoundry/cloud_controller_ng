/v3/stacks:
  get:
    summary: List stacks
    description: Retrieve all stacks.
    operationId: listStacks
    tags:
      - Stacks
    parameters:
      - $ref: ../components/parameters/Page.yaml
      - $ref: ../components/parameters/PerPage.yaml
      - $ref: ../components/parameters/OrderBy.yaml
      - $ref: ../components/parameters/CreatedAts.yaml
      - $ref: ../components/parameters/UpdatedAts.yaml
      - $ref: ../components/parameters/LabelSelector.yaml
      - name: names
        in: query
        schema:
          type: array
          items:
            type: string
        description: Comma-delimited list of stack names to filter by
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: ../components/schemas/StackList.yaml
            examples:
              default:
                summary: default
                value:
                  pagination:
                    total_results: 3
                    total_pages: 2
                    first:
                      href: https://api.example.org?page=1&per_page=2
                    last:
                      href: https://api.example.org?page=2&per_page=2
                    next:
                      href: https://api.example.org?page=2&per_page=2
                    previous: null
                  resources:
                    - guid: 123e4567-e89b-12d3-a456-426614174000
                      created_at: '2018-11-09T22:43:28Z'
                      updated_at: '2018-11-09T22:43:28Z'
                      name: my-stack-1
                      build_rootfs_image: my-stack-1-build
                      run_rootfs_image: my-stack-1-run
                      description: This is my first stack!
                      state: ACTIVE
                      state_reason: null
                      default: true
                      metadata:
                        labels: {}
                        annotations: {}
                      links:
                        self:
                          href: https://api.example.org/11c916c9-c2f9-440e-8e73-102e79c4704d
                    - guid: 123e4567-e89b-12d3-a456-426614174000
                      created_at: '2018-11-09T22:43:29Z'
                      updated_at: '2018-11-09T22:43:29Z'
                      name: my-stack-2
                      description: This is my second stack!
                      build_rootfs_image: my-stack-2-build
                      run_rootfs_image: my-stack-2-run
                      state: DEPRECATED
                      state_reason: Stack deprecated and will be removed in future release
                      default: false
                      metadata:
                        labels: {}
                        annotations: {}
                      links:
                        self:
                          href: https://api.example.org/81c916c9-c2f9-440e-8e73-102e79c4704h
      '400':
        $ref: ../components/responses/BadRequest.yaml
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '409':
        $ref: ../components/responses/Conflict.yaml
      '422':
        $ref: ../components/responses/UnprocessableEntity.yaml
      '500':
        $ref: ../components/responses/500.yaml
      '502':
        $ref: ../components/responses/BadGateway.yaml
      '503':
        $ref: ../components/responses/ServiceUnavailable.yaml
  post:
    summary: Create a stack
    description: Create a stack.
    operationId: createStack
    tags:
      - Stacks
    requestBody:
      $ref: ../components/requestBodies/StackCreateRequestBody.yaml
    responses:
      '201':
        description: Created
        content:
          application/json:
            schema:
              $ref: ../components/schemas/Stack.yaml
      '400':
        $ref: ../components/responses/BadRequest.yaml
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '409':
        $ref: ../components/responses/Conflict.yaml
      '422':
        $ref: ../components/responses/UnprocessableEntity.yaml
      '500':
        $ref: ../components/responses/500.yaml
      '503':
        $ref: ../components/responses/ServiceUnavailable.yaml
/v3/stacks/{guid}:
  get:
    summary: Get a stack
    description: Get a stack.
    operationId: getStack
    tags:
      - Stacks
    parameters:
      - $ref: ../components/parameters/Guid.yaml
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: ../components/schemas/Stack.yaml
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
  patch:
    summary: Update a stack
    description: Update a stack.
    operationId: updateStack
    tags:
      - Stacks
    parameters:
      - $ref: ../components/parameters/Guid.yaml
    requestBody:
      content:
        application/json:
          schema:
            properties:
              metadata:
                $ref: ../components/schemas/Metadata.yaml
          examples:
            default:
              summary: default
              value:
                metadata:
                  labels:
                    key: value
                  annotations:
                    note: detailed information
                state: ACTIVE
                state_reason: Optional plain text describing the stack state change
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: ../components/schemas/Stack.yaml
      '400':
        $ref: ../components/responses/BadRequest.yaml
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
      '409':
        $ref: ../components/responses/Conflict.yaml
      '422':
        $ref: ../components/responses/UnprocessableEntity.yaml
      '500':
        $ref: ../components/responses/500.yaml
      '503':
        $ref: ../components/responses/ServiceUnavailable.yaml
  delete:
    summary: Delete a stack
    description: Delete a stack.
    operationId: deleteStack
    tags:
      - Stacks
    parameters:
      - $ref: ../components/parameters/Guid.yaml
    responses:
      '204':
        description: No Content
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
      '422':
        $ref: ../components/responses/UnprocessableEntity.yaml
      '500':
        $ref: ../components/responses/500.yaml
