/v3/organization_quotas/{quota_guid}/relationships/organizations:
  post:
    summary: Apply an organization quota to an organization
    description: |-
      This endpoint applies an organization quota to one or more organizations.

      Only admin users can apply an organization quota to an organization.
    operationId: applyOrganizationQuota
    tags:
      - Organization Quotas
    parameters:
      - name: quota_guid
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RelationshipToMany.yaml
          examples:
            default:
              summary: default
              value:
                data:
                  - guid: 123e4567-e89b-12d3-a456-426614174000
                  - guid: 123e4567-e89b-12d3-a456-426614174000
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: ../components/schemas/RelationshipToMany.yaml
            examples:
              default:
                summary: default
                value:
                  data:
                    - guid: 123e4567-e89b-12d3-a456-426614174000
                    - guid: 123e4567-e89b-12d3-a456-426614174000
                    - guid: 123e4567-e89b-12d3-a456-426614174000
                  links:
                    self:
                      href: https://api.example.org/v3/organization_quotas/quota-guid/relationships/organizations
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
      '422':
        $ref: ../components/responses/UnprocessableEntity.yaml
