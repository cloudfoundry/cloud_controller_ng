/v3/processes:
  get:
    summary: List processes
    description: Retrieve all processes.
    operationId: listProcesses
    tags:
      - Processes
    parameters:
      - $ref: ../components/parameters/Page.yaml
      - $ref: ../components/parameters/PerPage.yaml
      - $ref: ../components/parameters/OrderBy.yaml
      - $ref: ../components/parameters/CreatedAts.yaml
      - $ref: ../components/parameters/UpdatedAts.yaml
      - $ref: ../components/parameters/LabelSelector.yaml
      - name: guids
        in: query
        schema:
          type: array
          items:
            type: string
        description: Comma-delimited list of process guids to filter by
      - name: types
        in: query
        schema:
          type: array
          items:
            type: string
        description: Comma-delimited list of process types to filter by
      - name: app_guids
        in: query
        schema:
          type: array
          items:
            type: string
        description: Comma-delimited list of app guids to filter by
      - name: space_guids
        in: query
        schema:
          type: array
          items:
            type: string
        description: Comma-delimited list of space guids to filter by
      - name: organization_guids
        in: query
        schema:
          type: array
          items:
            type: string
        description: Comma-delimited list of organization guids to filter by
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: ../components/schemas/ProcessList.yaml
      '400':
        $ref: ../components/responses/BadRequest.yaml
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '409':
        $ref: ../components/responses/Conflict.yaml
      '422':
        $ref: ../components/responses/UnprocessableEntity.yaml
      '500':
        $ref: ../components/responses/500.yaml
      '502':
        $ref: ../components/responses/BadGateway.yaml
      '503':
        $ref: ../components/responses/ServiceUnavailable.yaml
/v3/processes/{guid}:
  get:
    summary: Get a process
    description: Get a process.
    operationId: getProcess
    tags:
      - Processes
    parameters:
      - $ref: ../components/parameters/Guid.yaml
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: ../components/schemas/Process.yaml
            examples:
              default:
                summary: default
                value:
                  guid: 123e4567-e89b-12d3-a456-426614174000
                  type: web
                  command: rackup
                  user: vcap
                  instances: 5
                  memory_in_mb: 256
                  disk_in_mb: 1024
                  log_rate_limit_in_bytes_per_second: 1024
                  health_check:
                    type: port
                    data:
                      timeout: null
                  readiness_health_check:
                    type: process
                    data:
                      invocation_timeout: null
                  process_instances:
                    - index: 0
                      state: RUNNING
                      since: 123456789
                    - index: 1
                      state: STARTING
                      since: 123
                    - index: 2
                      state: DOWN
                      since: 456
                  relationships:
                    app:
                      data:
                        guid: 123e4567-e89b-12d3-a456-426614174000
                    revision:
                      data:
                        guid: 123e4567-e89b-12d3-a456-426614174000
                  metadata:
                    labels: {}
                    annotations: {}
                  created_at: '2016-03-23T18:48:22Z'
                  updated_at: '2016-03-23T18:48:42Z'
                  version: e9df685c-0464-4aa7-b5f0-8ed843077c13
                  links:
                    self:
                      href: https://api.example.org/v3/processes/6a901b7c-9417-4dc1-8189-d3234aa0ab82
                    scale:
                      href: https://api.example.org/v3/processes/6a901b7c-9417-4dc1-8189-d3234aa0ab82/actions/scale
                      method: POST
                    app:
                      href: https://api.example.org/v3/apps/ccc25a0f-c8f4-4b39-9f1b-de9f328d0ee5
                    space:
                      href: https://api.example.org/v3/spaces/2f35885d-0c9d-4423-83ad-fd05066f8576
                    stats:
                      href: https://api.example.org/v3/processes/6a901b7c-9417-4dc1-8189-d3234aa0ab82/stats
                    process_instances:
                      href: https://api.example.org/v3/processes/6a901b7c-9417-4dc1-8189-d3234aa0ab82/process_instances
        links:
          app:
            operationId: getApp
            parameters:
              guid: $response.body#/relationships/app/data/guid
            description: Retrieve the app for this process
          revision:
            operationId: getRevision
            parameters:
              guid: $response.body#/relationships/revision/data/guid
            description: Retrieve the revision for this process
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
  patch:
    summary: Update a process
    description: Update a process.
    operationId: updateProcess
    tags:
      - Processes
    parameters:
      - $ref: ../components/parameters/Guid.yaml
    requestBody:
      $ref: ../components/requestBodies/ProcessUpdateRequestBody.yaml
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: ../components/schemas/Process.yaml
        links:
          app:
            operationId: getApp
            parameters:
              guid: $response.body#/relationships/app/data/guid
            description: Retrieve the app for this process
          revision:
            operationId: getRevision
            parameters:
              guid: $response.body#/relationships/revision/data/guid
            description: Retrieve the revision for this process
      '400':
        $ref: ../components/responses/BadRequest.yaml
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
      '409':
        $ref: ../components/responses/Conflict.yaml
      '422':
        $ref: ../components/responses/UnprocessableEntity.yaml
      '500':
        $ref: ../components/responses/500.yaml
      '503':
        $ref: ../components/responses/ServiceUnavailable.yaml
/v3/processes/{guid}/process_instances:
  get:
    summary: List instances for a process
    description: Retrieve the instances for a process. Unlike the stats endpoint, this returns a simplified view with only the index, state, and uptime of each instance.
    operationId: listProcessInstances
    tags:
      - Processes
    parameters:
      - $ref: ../components/parameters/Guid.yaml
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                resources:
                  type: array
                  items:
                    type: object
                    properties:
                      index:
                        type: integer
                      state:
                        type: string
                        enum:
                          - RUNNING
                          - CRASHED
                          - STARTING
                          - DOWN
                      since:
                        type: number
                        format: double
                links:
                  type: object
                  properties:
                    self:
                      $ref: ../components/schemas/Link.yaml
                    process:
                      $ref: ../components/schemas/Link.yaml
            examples:
              default:
                summary: default
                value:
                  resources:
                    - index: 0
                      state: RUNNING
                      since: 123456789
                    - index: 1
                      state: STARTING
                      since: 123
                    - index: 2
                      state: DOWN
                      since: 456
                  links:
                    self:
                      href: https://api.example.org/v3/processes/6a901b7c-9417-4dc1-8189-d3234aa0ab82/process_instances
                    process:
                      href: https://api.example.org/v3/processes/6a901b7c-9417-4dc1-8189-d3234aa0ab82
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
