/v3/processes/{guid}/actions/scale:
  post:
    summary: Scale a process
    description: Scale a process.
    operationId: scaleProcess
    tags:
      - Processes
    parameters:
      - $ref: ../components/parameters/Guid.yaml
    requestBody:
      content:
        application/json:
          schema:
            properties:
              instances:
                type:
                  - integer
                  - 'null'
                description: The number of instances to run
              memory_in_mb:
                type:
                  - integer
                  - 'null'
                description: The memory in MB allocated per instance
              disk_in_mb:
                type:
                  - integer
                  - 'null'
                description: The disk in MB allocated per instance
              log_rate_limit_in_bytes_per_second:
                type:
                  - integer
                  - 'null'
                description: The log rate limit in bytes per second per instance
          examples:
            default:
              summary: default
              value:
                instances: 5
                memory_in_mb: 256
                disk_in_mb: 1024
                log_rate_limit_in_bytes_per_second: 1024
    responses:
      '202':
        description: Accepted
        content:
          application/json:
            schema:
              $ref: ../components/schemas/Process.yaml
      '400':
        $ref: ../components/responses/BadRequest.yaml
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
      '409':
        $ref: ../components/responses/Conflict.yaml
      '422':
        $ref: ../components/responses/UnprocessableEntity.yaml
      '500':
        $ref: ../components/responses/500.yaml
      '503':
        $ref: ../components/responses/ServiceUnavailable.yaml
/v3/processes/{guid}/instances/{index}:
  delete:
    summary: Terminate a process instance
    description: |-
      Terminate an instance of a specific process. Health management will eventually restart the instance.

      This allows a user to stop a single misbehaving instance of a process.
    operationId: terminateProcessInstance
    tags:
      - Processes
    parameters:
      - $ref: ../components/parameters/Guid.yaml
      - name: index
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: No Content
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
      '422':
        $ref: ../components/responses/UnprocessableEntity.yaml
      '500':
        $ref: ../components/responses/500.yaml
