description: Service plan visibility object that needs to be created
required: true
content:
  application/json:
    schema:
      type: object
      properties:
        type:
          type: string
          enum:
            - public
            - admin
            - organization
          description: Denotes the visibility of the plan
        organizations:
          type: array
          items:
            type: object
            properties:
              guid:
                type: string
                format: uuid
            required:
              - guid
          description: Desired list of organizations GUIDs where the plan will be accessible; required if type is organization
      required:
        - type
    examples:
      default:
        summary: default
        value:
          type: organization
          organizations:
            - guid: 123e4567-e89b-12d3-a456-426614174000
