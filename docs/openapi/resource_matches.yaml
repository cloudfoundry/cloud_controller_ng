---
openapi: 3.0.3
info:
  title: Cloud Controller V3 API
  version: v3
  description: This endpoint matches given resource SHA-1/file size pairs against
    the Cloud Controller cache and reports the subset that describes already cached
    files. This is usually used to avoid uploading duplicate files when pushing an
    app which has only been partially changed. The `path` and `mode` fields are not
    used when matching. When [uploading package bits](#upload-package-bits), the response
    from this endpoint should be used as the `resources` form field. As such, it is
    useful to include the `path` and `mode` fields for each resource even though they
    are not used when determining a resource match. Cloud Foundry operators may set
    minimum/maximum file sizes to match against. If the file size provided is outside
    this range, it will not be matched against. If the `resource_matching` [feature
    flag](#the-feature-flag-object) is disabled, resource matching will always return
    an empty array.
servers: []
paths:
  "/v3/resource_matches":
    post:
      summary: Create a resource match
      tags:
      - ResourceMatch
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                resources:
                  type: array
                  items:
                    type: object
                    properties:
                      checksum:
                        type: object
                        properties:
                          value:
                            type: string
                        required:
                        - value
                      size_in_bytes:
                        type: integer
                      path:
                        type: string
                      mode:
                        type: string
                    required:
                    - checksum
                    - size_in_bytes
                    - path
                    - mode
              required:
              - resources
            example:
              resources:
              - checksum:
                  value: 002d760bea1be268e27077412e11a320d0f164d3
                size_in_bytes: 36
                path: "/path/to/filename"
                mode: '0755'
              - checksum:
                  value: a9993e364706816aba3e25717850c26c9cd0d89d
                size_in_bytes: 1
                path: C:\unknown\file
                mode: '0644'
      responses:
        '201':
          description: returns zero matches
          content:
            application/json:
              schema:
                type: object
                properties:
                  resources:
                    type: array
                    items:
                      type: object
                      properties:
                        checksum:
                          type: object
                          properties:
                            value:
                              type: string
                          required:
                          - value
                        size_in_bytes:
                          type: integer
                        path:
                          type: string
                        mode:
                          type: string
                      required:
                      - checksum
                      - size_in_bytes
                      - path
                      - mode
                required:
                - resources
              example:
                resources: []
tags:
- name: ResourceMatch
  description: This endpoint matches given resource SHA-1/file size pairs against
    the Cloud Controller cache and reports the subset that describes already cached
    files. This is usually used to avoid uploading duplicate files when pushing an
    app which has only been partially changed. The `path` and `mode` fields are not
    used when matching. When [uploading package bits](#upload-package-bits), the response
    from this endpoint should be used as the `resources` form field. As such, it is
    useful to include the `path` and `mode` fields for each resource even though they
    are not used when determining a resource match. Cloud Foundry operators may set
    minimum/maximum file sizes to match against. If the file size provided is outside
    this range, it will not be matched against. If the `resource_matching` [feature
    flag](#the-feature-flag-object) is disabled, resource matching will always return
    an empty array.
