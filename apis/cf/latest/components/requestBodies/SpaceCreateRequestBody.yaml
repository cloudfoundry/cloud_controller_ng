description: Space object that needs to be created
required: true
content:
  application/json:
    schema:
      type: object
      properties:
        name:
          type: string
          description: Name of the space
        relationships:
          type: object
          properties:
            organization:
              $ref: ../schemas/RelationshipToOne.yaml
              description: A relationship to an organization
          required:
            - organization
        metadata:
          $ref: ../schemas/Metadata.yaml
      required:
        - name
        - relationships
      description: Request schema for creating a space
    examples:
      default:
        summary: default
        value:
          name: my-space
          relationships:
            organization:
              data:
                guid: 123e4567-e89b-12d3-a456-426614174000
