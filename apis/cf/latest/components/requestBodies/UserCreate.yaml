description: User to create
content:
  application/json:
    schema:
      type: object
      properties:
        guid:
          type: string
          description: Unique identifier for the user
        username:
          type: string
          description: Username of the user to be created. This can only be provided together with origin
        origin:
          type: string
          description: Origin of the user to be created. This can only be provided together with username and cannot be uaa
        metadata:
          $ref: ../schemas/Metadata.yaml
    examples:
      default:
        summary: default
        value:
          guid: 123e4567-e89b-12d3-a456-426614174000
      by_username_and_origin:
        summary: by username and origin
        value:
          username: some-user
          origin: some-origin
