/v3/organizations/{guid}/usage_summary:
  get:
    summary: Get usage summary
    description: This endpoint retrieves the specified organization object's memory and app instance usage summary.
    operationId: getUsageSummaryForOrganization
    tags:
      - Organizations
    parameters:
      - $ref: ../components/parameters/Guid.yaml
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                usage_summary:
                  type: object
                  properties:
                    started_instances:
                      type: integer
                    memory_in_mb:
                      type: integer
                    routes:
                      type: integer
                    service_instances:
                      type: integer
                    reserved_ports:
                      type: integer
                    domains:
                      type: integer
                    per_app_tasks:
                      type: integer
                    service_keys:
                      type: integer
                links:
                  type: object
                  properties:
                    self:
                      $ref: ../components/schemas/Link.yaml
                      description: The URL to get this usage summary
                    organization:
                      $ref: ../components/schemas/Link.yaml
                      description: The URL to get the organization for this usage summary
            examples:
              default:
                summary: default
                value:
                  usage_summary:
                    started_instances: 3
                    memory_in_mb: 50
                    routes: 4
                    service_instances: 2
                    reserved_ports: 1
                    domains: 4
                    per_app_tasks: 2
                    service_keys: 1
                  links:
                    self:
                      href: https://api.example.org/v3/organizations/d4c91047-7b29-4fda-b7f9-04033e5c9c9f/usage_summary
                    organization:
                      href: https://api.example.org/v3/organizations/d4c91047-7b29-4fda-b7f9-04033e5c9c9f
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
/v3/organizations/{guid}/users:
  get:
    summary: List users for an organization
    description: Retrieve all users with a role in the specified organization.
    operationId: listUsersForOrganization
    tags:
      - Organizations
    parameters:
      - $ref: ../components/parameters/Guid.yaml
      - $ref: ../components/parameters/Page.yaml
      - $ref: ../components/parameters/PerPage.yaml
      - $ref: ../components/parameters/OrderBy.yaml
      - name: guids
        in: query
        schema:
          type: array
          items:
            type: string
        description: Comma-delimited list of user guids to filter by
      - name: usernames
        in: query
        schema:
          type: array
          items:
            type: string
        description: Comma-delimited list of usernames to filter by
      - name: origins
        in: query
        schema:
          type: array
          items:
            type: string
        description: Comma-delimited list of user origins to filter by
      - name: partial_usernames
        in: query
        schema:
          type: array
          items:
            type: string
        description: Comma-delimited list of partial usernames to filter by
      - $ref: ../components/parameters/LabelSelector.yaml
      - $ref: ../components/parameters/CreatedAts.yaml
      - $ref: ../components/parameters/UpdatedAts.yaml
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: ../components/schemas/UserList.yaml
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
/v3/organizations/{guid}/relationships/default_isolation_segment:
  get:
    summary: Get default isolation segment
    description: Retrieve the default isolation segment for a given organization.
    operationId: getDefaultIsolationSegmentForOrganization
    tags:
      - Organizations
    parameters:
      - $ref: ../components/parameters/Guid.yaml
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: ../components/schemas/RelationshipToOne.yaml
            examples:
              default:
                summary: default
                value:
                  data:
                    guid: 123e4567-e89b-12d3-a456-426614174000
                  links:
                    self:
                      href: https://api.example.org/v3/organizations/d4c91047-7b29-4fda-b7f9-04033e5c9c9f/relationships/default_isolation_segment
                    related:
                      href: https://api.example.org/v3/isolation_segments/9d8e007c-ce52-4ea7-8a57-f2825d2c6b39
