      '403':
        $ref: ../components/responses/Forbidden.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
  patch:
    summary: Assign default isolation segment
    description: |-
      Set the default isolation segment for a given organization. Only isolation segments that are entitled to the organization are eligible to be the default isolation segment.

      Apps will not run in the new default isolation segment until they are restarted.
    operationId: assignDefaultIsolationSegmentForOrganization
    tags:
      - Organizations
    parameters:
      - $ref: ../components/parameters/Guid.yaml
    requestBody:
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RelationshipToOne.yaml
          examples:
            default:
              summary: default
              value:
                data:
                  guid: 123e4567-e89b-12d3-a456-426614174000
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: ../components/schemas/RelationshipToOne.yaml
            examples:
              default:
                summary: default
                value:
                  data:
                    guid: 123e4567-e89b-12d3-a456-426614174000
                  links:
                    self:
                      href: https://api.example.org/v3/organizations/d4c91047-7b29-4fda-b7f9-04033e5c9c9f/relationships/default_isolation_segment
                    related:
                      href: https://api.example.org/v3/isolation_segments/9d8e007c-ce52-4ea7-8a57-f2825d2c6b39
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
      '422':
        $ref: ../components/responses/UnprocessableEntity.yaml
