/v3/space_quotas/{quota_guid}/relationships/spaces:
  post:
    summary: Apply a space quota to a space
    description: |-
      This endpoint applies a space quota to one or more spaces.

      Only an admin or an org manager in the quota’s parent organization can apply a space quota to a space.
    operationId: applySpaceQuota
    tags:
      - Space Quotas
    parameters:
      - name: quota_guid
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RelationshipToMany.yaml
          examples:
            default:
              summary: default
              value:
                data:
                  - guid: 123e4567-e89b-12d3-a456-426614174000
                  - guid: 123e4567-e89b-12d3-a456-426614174000
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: ../components/schemas/RelationshipToMany.yaml
            examples:
              default:
                summary: default
                value:
                  data:
                    - guid: 123e4567-e89b-12d3-a456-426614174000
                    - guid: 123e4567-e89b-12d3-a456-426614174000
                    - guid: 123e4567-e89b-12d3-a456-426614174000
                  links:
                    self:
                      href: https://api.example.org/v3/space_quotas/quota-guid/relationships/spaces
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
      '422':
        $ref: ../components/responses/UnprocessableEntity.yaml
/v3/space_quotas/{guid}/relationships/spaces/{space_guid}:
  delete:
    summary: Remove a space quota from a space
    description: |-
      This endpoint removes a space quota from a space.

      Only an admin or an org manager in the quota’s parent organization can remove a space quota from a space.
    operationId: removeSpaceQuotaFromSpace
    tags:
      - Space Quotas
    parameters:
      - $ref: ../components/parameters/Guid.yaml
      - name: space_guid
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: No Content
      '401':
        $ref: ../components/responses/Unauthorized.yaml
      '403':
        $ref: ../components/responses/Forbidden.yaml
      '404':
        $ref: ../components/responses/NotFound.yaml
      '422':
        $ref: ../components/responses/UnprocessableEntity.yaml
